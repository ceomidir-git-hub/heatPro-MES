<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>가동율 현황 | HeatPro MES</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --blue:#185FA5;--blue-lt:#E6F1FB;--blue-dk:#0C447C;
  --green:#3B6D11;--green-lt:#EAF3DE;--green-dk:#27500A;
  --amber:#854F0B;--amber-lt:#FAEEDA;
  --red:#A32D2D;--red-lt:#FCEBEB;
  --gray:#5F5E5A;--gray-lt:#F1EFE8;--gray-bd:#D3D1C7;
  --bg:#F8F7F4;--white:#FFFFFF;--text:#2C2C2A;--text-sub:#888780;
}
body{font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;}

.top-header{background:var(--white);border-bottom:1px solid var(--gray-bd);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:700;color:var(--blue);text-decoration:none;}
.logo svg{width:20px;height:20px;}
nav{display:flex;gap:4px;}
nav a{font-size:12px;color:var(--text-sub);text-decoration:none;padding:5px 10px;border-radius:6px;border:1px solid transparent;}
nav a:hover{background:var(--gray-lt);color:var(--text);}
nav a.active{background:var(--blue-lt);color:var(--blue-dk);border-color:#B5D4F4;font-weight:500;}

.container{max-width:1280px;margin:0 auto;padding:20px 20px 48px;width:100%;}

.page-title{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.page-title svg{width:20px;height:20px;color:var(--blue);flex-shrink:0;}
.page-title h1{font-size:18px;font-weight:700;}
.page-title .sub{font-size:12px;color:var(--text-sub);}
.badge-wrap{margin-left:auto;display:flex;gap:6px;align-items:center;}
.year-badge{background:var(--blue-lt);color:var(--blue-dk);font-size:11px;font-weight:600;padding:3px 10px;border-radius:99px;}
.target-badge{background:var(--red-lt);color:var(--red);font-size:11px;font-weight:600;padding:3px 10px;border-radius:99px;}

.filter-card{background:var(--white);border:1px solid var(--gray-bd);border-radius:10px;padding:13px 16px;margin-bottom:12px;}
.filter-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.fg{display:flex;align-items:center;gap:6px;}
.fg label{font-size:12px;color:var(--text-sub);white-space:nowrap;}
.fg select{height:32px;border:1px solid var(--gray-bd);border-radius:6px;padding:0 10px;font-size:12px;color:var(--text);background:var(--white);outline:none;}
.fg select:focus{border-color:var(--blue);}
.btn-row{display:flex;gap:6px;margin-left:auto;}
.btn{display:inline-flex;align-items:center;gap:4px;height:32px;padding:0 13px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--gray-bd);background:var(--white);color:var(--text-sub);transition:background .1s;}
.btn:hover{background:var(--gray-lt);}
.btn svg{width:14px;height:14px;flex-shrink:0;}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue);}
.btn-primary:hover{background:var(--blue-dk);}

.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;}
.kpi-card{background:var(--white);border:1px solid var(--gray-bd);border-radius:10px;padding:10px 13px;}
.kpi-label{font-size:11px;color:var(--text-sub);margin-bottom:3px;white-space:nowrap;}
.kpi-val{font-size:18px;font-weight:700;color:var(--text);}
.kpi-unit{font-size:11px;font-weight:400;color:var(--text-sub);margin-left:1px;}
.kpi-danger{background:var(--red-lt);border-color:#F7C1C1;}
.kpi-danger .kpi-label{color:var(--red);}
.kpi-danger .kpi-val{color:var(--red);}

.chart-card{background:var(--white);border:1px solid var(--gray-bd);border-radius:10px;padding:16px;margin-bottom:12px;}
.chart-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.chart-title{font-size:13px;font-weight:600;color:var(--text);}
.legend{display:flex;gap:14px;font-size:11px;color:var(--text-sub);}
.legend span{display:flex;align-items:center;gap:4px;}
.leg-line{width:18px;height:2px;background:#378ADD;position:relative;}
.leg-line::after{content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:6px;height:6px;border-radius:50%;background:#fff;border:2px solid #378ADD;}
.leg-dash{width:18px;height:0;border-top:2px dashed #E24B4A;}

.table-card{background:var(--white);border:1px solid var(--gray-bd);border-radius:10px;overflow:hidden;}
.table-toolbar{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--gray-bd);}
.t-title{font-size:13px;font-weight:600;color:var(--text);}
.t-sub{font-size:12px;color:var(--text-sub);margin-left:12px;}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}

table{border-collapse:collapse;font-size:11px;min-width:1100px;width:100%;}
th{padding:5px 4px;text-align:center;font-size:10px;font-weight:600;background:var(--gray-lt);color:var(--text-sub);border-bottom:1px solid var(--gray-bd);border-right:1px solid var(--gray-bd);white-space:nowrap;}
th.th-sum{background:#E6F1FB;color:var(--blue-dk);}
th.th-red{color:var(--red);}
th:last-child{border-right:none;}
td{padding:5px 4px;text-align:center;color:var(--text);border-bottom:1px solid #EEECEA;border-right:1px solid #EEECEA;font-size:11px;white-space:nowrap;}
td:last-child{border-right:none;}
tr:last-child td{border-bottom:none;}
.td-label{text-align:left;padding-left:8px;color:var(--text-sub);font-size:10px;background:var(--white);}
.td-group{background:var(--gray-lt);font-weight:600;font-size:10px;color:var(--text);writing-mode:vertical-rl;text-orientation:mixed;width:18px;padding:4px 3px;}
.td-sum{background:#E6F1FB;color:var(--blue-dk);font-weight:600;}
.td-rate{color:var(--red);font-weight:600;}
.td-sub{font-size:10px;color:var(--text-sub);text-align:left;padding-left:16px;background:var(--white);}
.td-sep{height:3px;background:var(--gray-lt);padding:0;}
.td-empty{color:var(--gray-bd);}

.status-bar{display:flex;align-items:center;gap:6px;padding:8px 14px;border-top:1px solid var(--gray-bd);font-size:11px;color:var(--text-sub);}
.status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.dot-ok{background:var(--green);}
.dot-loading{background:var(--amber);animation:pulse 1s infinite;}
.dot-error{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#2C2C2A;color:#fff;font-size:13px;padding:10px 20px;border-radius:8px;z-index:9999;opacity:0;pointer-events:none;transition:opacity .2s;white-space:nowrap;}
.toast.show{opacity:1;}

@media(max-width:768px){.kpi-row{grid-template-columns:repeat(2,1fr);}.filter-row{flex-wrap:wrap;}}
</style>
</head>
<body>

<header class="top-header">
  <a class="logo" href="https://ceomidir-git-hub.github.io/heatPro-MES/">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
      <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
    </svg>
    HeatPro MES
  </a>
  <nav>
    <a href="https://ceomidir-git-hub.github.io/heatPro-MES/">대시보드</a>
    <a href="https://ceomidir-git-hub.github.io/heatPro-MES/GitHub_Worksheet.html">작업일보</a>
    <a href="https://ceomidir-git-hub.github.io/heatPro-MES/Monthly_Production_Record.html">월생산실적</a>
    <a class="active" href="#">가동율 현황</a>
  </nav>
</header>

<main class="container">

  <div class="page-title">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
    </svg>
    <h1>가동율 현황</h1>
    <span class="sub">Operating Rate</span>
    <div class="badge-wrap">
      <span class="year-badge" id="yearBadge">2026년도</span>
      <span class="target-badge">[목표 : 80%]</span>
    </div>
  </div>

  <div class="filter-card">
    <div class="filter-row">
      <div class="fg">
        <label>설비</label>
        <select id="selEquip" style="width:150px;"></select>
      </div>
      <div class="fg">
        <label>월</label>
        <select id="selMonth" style="width:80px;">
          <option value="1">1월</option><option value="2">2월</option>
          <option value="3">3월</option><option value="4">4월</option>
          <option value="5">5월</option><option value="6">6월</option>
          <option value="7">7월</option><option value="8">8월</option>
          <option value="9">9월</option><option value="10">10월</option>
          <option value="11">11월</option><option value="12">12월</option>
        </select>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="loadData()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          조회
        </button>
        <button class="btn" onclick="exportCSV()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          CSV 내보내기
        </button>
      </div>
    </div>
  </div>

  <div class="kpi-row">
    <div class="kpi-card">
      <div class="kpi-label">조업시간 합계</div>
      <div class="kpi-val" id="kOp">—<span class="kpi-unit">분</span></div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">부하시간 합계</div>
      <div class="kpi-val" id="kLoad">—<span class="kpi-unit">분</span></div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">가동시간 합계</div>
      <div class="kpi-val" id="kRun">—<span class="kpi-unit">분</span></div>
    </div>
    <div class="kpi-card kpi-danger">
      <div class="kpi-label">월 가동률</div>
      <div class="kpi-val" id="kRate">—<span class="kpi-unit">%</span></div>
    </div>
  </div>

  <div class="chart-card">
    <div class="chart-top">
      <span class="chart-title" id="chartTitle">가동률 현황</span>
      <div class="legend">
        <span><span class="leg-line"></span>가동률(%)</span>
        <span><span class="leg-dash"></span>목표(80%)</span>
      </div>
    </div>
    <div style="position:relative;width:100%;height:260px;">
      <canvas id="opChart" role="img" aria-label="일별 가동률 꺾은선 차트, 목표선 80%">일별 가동률 현황</canvas>
    </div>
  </div>

  <div class="table-card">
    <div class="table-toolbar">
      <span class="t-title" id="tableTitle">가동율 현황</span>
      <span class="t-sub" id="tableSub"></span>
    </div>
    <div class="table-wrap">
      <table id="mainTable">
        <thead id="thead"></thead>
        <tbody id="tbody">
          <tr><td colspan="34" style="padding:30px;color:var(--text-sub);text-align:center;">설비와 월을 선택 후 조회하세요.</td></tr>
        </tbody>
      </table>
    </div>
    <div class="status-bar">
      <span class="status-dot dot-loading" id="sDot"></span>
      <span id="sText">설비 목록 로드 중...</span>
    </div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
var API_URL = 'https://script.google.com/macros/s/AKfycbw3H6QfMJYTlR24IlZ-IOfk5GKml1RDm_f_CU4iSbhua-bREeVI14NIeaY3oU1sfdWVLA/exec';
var opChart = null;
var allRows = [];

// 2026년 공휴일
var HOLIDAYS_2026 = [
  '2026-01-01','2026-01-28','2026-01-29','2026-01-30',
  '2026-03-01','2026-05-05','2026-05-25','2026-06-06',
  '2026-08-15','2026-09-24','2026-09-25','2026-09-26',
  '2026-10-03','2026-10-09','2026-12-25'
];

function isWorkday(dateStr) {
  var d = new Date(dateStr);
  var dow = d.getDay();
  if (dow === 0 || dow === 6) return false;
  if (HOLIDAYS_2026.indexOf(dateStr) >= 0) return false;
  return true;
}

function pad2(n) { return String(n).padStart(2,'0'); }
function toNum(v) { var n = Number(v); return isNaN(n) ? 0 : n; }

// ── 초기화 ──
window.onload = function () {
  var today = new Date();
  document.getElementById('selMonth').value = today.getMonth() + 1;
  document.getElementById('yearBadge').textContent = today.getFullYear() + '년도';
  loadEquipList();
};

// ── 설비 목록 로드 ──
function loadEquipList() {
  var cb = 'cbEq_' + Date.now();
  var sc = document.createElement('script');
  sc.src = API_URL + '?callback=' + cb;
  window[cb] = function (data) {
    document.head.removeChild(sc); delete window[cb];
    var sel = document.getElementById('selEquip');
    var list = (data && data.equipment) ? data.equipment : [];
    if (list.length === 0) {
      sel.add(new Option('설비 없음', ''));
    } else {
      list.forEach(function (e) {
        var name = e.name || '';
        if (name) sel.add(new Option(name, name));
      });
    }
    setStatus('ok', '설비 목록 로드 완료. 조회 버튼을 눌러주세요.');
  };
  sc.onerror = function () {
    document.head.removeChild(sc); delete window[cb];
    setStatus('error', '설비 목록 로드 실패');
  };
  document.head.appendChild(sc);
}

// ── 데이터 로드 ──
function loadData() {
  var eq    = document.getElementById('selEquip').value;
  var month = parseInt(document.getElementById('selMonth').value);
  var year  = new Date().getFullYear();

  if (!eq) { showToast('⚠️ 설비를 선택하세요.'); return; }
  setStatus('loading', '데이터 불러오는 중...');

  var cb = 'cbOp_' + Date.now();
  var sc = document.createElement('script');
  sc.src = API_URL + '?action=operatingRate&year=' + year + '&month=' + month + '&equipment=' + encodeURIComponent(eq) + '&callback=' + cb;

  window[cb] = function (data) {
    document.head.removeChild(sc); delete window[cb];
    allRows = (data && data.rows) ? data.rows : [];
    render(year, month, eq);
    setStatus('ok', eq + ' ' + month + '월 로드 완료 · ' + allRows.length + '건');
  };
  sc.onerror = function () {
    document.head.removeChild(sc); delete window[cb];
    setStatus('error', 'API 연결 실패 — Code.gs의 action=operatingRate 분기를 확인하세요.');
  };
  document.head.appendChild(sc);
  setTimeout(function () {
    if (window[cb]) {
      document.head.removeChild(sc); delete window[cb];
      setStatus('error', '응답 시간 초과');
    }
  }, 10000);
}

// ── 렌더링 메인 ──
function render(year, month, eq) {
  var daysInMonth = new Date(year, month, 0).getDate();

  // 날짜별 rowMap 생성
  var rowMap = {};
  allRows.forEach(function (r) {
    var d = r.작업일 ? r.작업일.substring(8, 10) : '';
    if (!d) return;
    var day = parseInt(d);
    if (!rowMap[day]) rowMap[day] = [];
    rowMap[day].push(r);
  });

  // 일별 집계
  var dayData = [];
  for (var d = 1; d <= daysInMonth; d++) {
    var dateStr = year + '-' + pad2(month) + '-' + pad2(d);
    var workday = isWorkday(dateStr);
    var rows    = rowMap[d] || [];

    var kyouk=0,gongsa=0,gaebal=0,bangmun=0,gita1=0;
    var jeongi=0,naengak=0,koil=0,gita2=0;
    var jogeon=0,sayang=0,gita3=0;

    rows.forEach(function (r) {
      kyouk  += toNum(r.교육);  gongsa  += toNum(r.공사);
      gaebal += toNum(r.개발);  bangmun += toNum(r.방문); gita1 += toNum(r.기타1);
      jeongi += toNum(r.전기);  naengak += toNum(r.냉각);
      koil   += toNum(r.코일);  gita2   += toNum(r.기타2);
      jogeon += toNum(r.조건);  sayang  += toNum(r.사양); gita3 += toNum(r.기타3);
    });

    var 조업시간  = workday ? 480 : 0;
    var 계획정지  = kyouk + gongsa + gaebal + bangmun + gita1;
    var 부하시간  = 조업시간 - 계획정지;
    var 비가동시간 = jeongi + naengak + koil + gita2 + jogeon + sayang + gita3;
    var 가동시간  = Math.max(0, 부하시간 - 비가동시간);
    var 가동률    = 부하시간 > 0 ? Math.round(가동시간 / 부하시간 * 1000) / 10 : null;

    dayData.push({
      day: d, dateStr: dateStr, workday: workday,
      조업시간, 계획정지, 부하시간, 비가동시간, 가동시간, 가동률,
      교육:kyouk, 공사:gongsa, 개발:gaebal, 방문:bangmun, 기타1:gita1,
      전기:jeongi, 냉각:naengak, 코일:koil, 기타2:gita2,
      조건:jogeon, 사양:sayang, 기타3:gita3
    });
  }

  // 합계
  var tot = { 조업시간:0, 계획정지:0, 부하시간:0, 비가동시간:0, 가동시간:0,
    교육:0, 공사:0, 개발:0, 방문:0, 기타1:0,
    전기:0, 냉각:0, 코일:0, 기타2:0, 조건:0, 사양:0, 기타3:0 };
  dayData.forEach(function (d) {
    Object.keys(tot).forEach(function (k) { tot[k] += d[k]; });
  });
  var tot가동률 = tot.부하시간 > 0 ? Math.round(tot.가동시간 / tot.부하시간 * 1000) / 10 : 0;

  // KPI 업데이트
  document.getElementById('kOp').innerHTML   = tot.조업시간.toLocaleString() + '<span class="kpi-unit">분</span>';
  document.getElementById('kLoad').innerHTML = tot.부하시간.toLocaleString() + '<span class="kpi-unit">분</span>';
  document.getElementById('kRun').innerHTML  = tot.가동시간.toLocaleString() + '<span class="kpi-unit">분</span>';
  document.getElementById('kRate').innerHTML = tot가동률 + '<span class="kpi-unit">%</span>';

  // 타이틀 업데이트
  var title = eq + ' 가동률 현황 ( ' + month + '월 )';
  document.getElementById('chartTitle').textContent = title;
  document.getElementById('tableTitle').textContent = title;
  document.getElementById('tableSub').textContent   =
    '가동시간 ' + tot.가동시간.toLocaleString() + '   비가동시간 ' + tot.비가동시간.toLocaleString() + '   가동률(%) ' + tot가동률 + '%';

  renderChart(dayData, daysInMonth);
  renderTable(dayData, daysInMonth, tot, tot가동률);
}

// ── 차트 렌더링 ──
function renderChart(dayData, days) {
  if (opChart) { opChart.destroy(); opChart = null; }

  var labels   = dayData.map(function (d) { return d.day + '일'; });
  var rateData = dayData.map(function (d) { return d.workday ? d.가동률 : null; });
  var target   = new Array(days).fill(80);

  opChart = new Chart(document.getElementById('opChart'), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        {
          label: '가동률(%)',
          data: rateData,
          borderColor: '#378ADD', backgroundColor: '#378ADD',
          borderWidth: 2, pointRadius: 4,
          pointBackgroundColor: '#fff', pointBorderColor: '#378ADD', pointBorderWidth: 2,
          tension: 0.3, spanGaps: false, order: 1
        },
        {
          label: '목표(80%)',
          data: target,
          borderColor: '#E24B4A', borderWidth: 1.5,
          borderDash: [5, 4], pointRadius: 0, tension: 0, order: 2
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      clip: false, layout: { padding: { top: 24, left: 4, right: 4 } },
      plugins: { legend: { display: false }, tooltip: { mode: 'index', intersect: false } },
      scales: {
        y: {
          min: 0, max: 120,
          ticks: { callback: function (v) { return v + '%'; }, font: { size: 10 } },
          grid: { color: 'rgba(128,128,128,0.08)' }
        },
        x: { ticks: { font: { size: 10 }, autoSkip: true, maxTicksLimit: 16 }, grid: { display: false } }
      }
    },
    plugins: [{
      id: 'lbl',
      afterDatasetsDraw: function (chart) {
        var ctx = chart.ctx; ctx.save();
        var meta = chart.getDatasetMeta(0);
        meta.data.forEach(function (pt, i) {
          var v = rateData[i];
          if (v === null || v === undefined) return;
          ctx.font = 'bold 9px sans-serif';
          ctx.fillStyle = '#185FA5';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'bottom';
          ctx.fillText(v + '%', pt.x, pt.y - 8);
        });
        ctx.restore();
      }
    }]
  });
}

// ── 테이블 렌더링 ──
function renderTable(dayData, days, tot, tot가동률) {
  // 요일 판별
  function getDow(dateStr) {
    var dow = new Date(dateStr).getDay();
    return dow;
  }

  // 헤더
  var thCells = '<th colspan="2" style="width:72px;">구분</th><th class="th-sum">합계</th>';
  dayData.forEach(function (d) {
    var dow = getDow(d.dateStr);
    var isRed = dow === 0 || dow === 6 || HOLIDAYS_2026.indexOf(d.dateStr) >= 0;
    thCells += '<th' + (isRed ? ' class="th-red"' : '') + '>' + d.day + '</th>';
  });
  document.getElementById('thead').innerHTML = '<tr>' + thCells + '</tr>';

  function makeRow(label, key, isRate, isSub) {
    var tdLabel = isSub
      ? '<td class="td-sub">' + label + '</td>'
      : '<td class="td-label">' + label + '</td>';
    var totVal = isRate ? (tot가동률 + '%') : (tot[key] !== undefined ? tot[key].toLocaleString() : '');
    var tdSum = '<td class="td-sum' + (isRate ? ' td-rate' : '') + '">' + totVal + '</td>';
    var tdCells = dayData.map(function (d) {
      if (isRate) {
        if (!d.workday) return '<td class="td-empty"></td>';
        var v = d.가동률;
        return '<td class="td-rate">' + (v !== null ? v + '%' : '') + '</td>';
      }
      var v = d[key];
      if (!d.workday && (key === '조업시간' || key === '부하시간' || key === '가동시간' || key === '비가동시간' || key === '계획정지')) {
        return '<td class="td-empty"></td>';
      }
      if (v === 0 && isSub) return '<td class="td-empty">0</td>';
      return '<td>' + (v !== undefined && v !== null ? (typeof v === 'number' ? v.toLocaleString() : v) : '') + '</td>';
    }).join('');
    return tdLabel + tdSum + tdCells;
  }

  function sepRow(colspan) {
    return '<tr><td colspan="' + colspan + '" class="td-sep"></td></tr>';
  }

  var cols = days + 3;
  var tbody = '';

  // 기본 6행
  tbody += '<tr>' + makeRow('조업시간',   '조업시간',   false, false) + '</tr>';
  tbody += '<tr>' + makeRow('계획정지',   '계획정지',   false, false) + '</tr>';
  tbody += '<tr>' + makeRow('부하시간',   '부하시간',   false, false) + '</tr>';
  tbody += '<tr>' + makeRow('가동시간',   '가동시간',   false, false) + '</tr>';
  tbody += '<tr>' + makeRow('비가동시간', '비가동시간', false, false) + '</tr>';
  tbody += '<tr>' + makeRow('가동률(%)',  '',           true,  false) + '</tr>';

  // 계획정지 세부
  tbody += sepRow(cols);
  var cpSubs = ['교육','공사','개발','방문','기타1'];
  cpSubs.forEach(function (k, i) {
    var groupTd = i === 0
      ? '<td class="td-group" rowspan="5">계획정지</td>'
      : '';
    tbody += '<tr>' + groupTd + makeRow(k, k, false, true) + '</tr>';
  });

  // 설비정지 세부
  tbody += sepRow(cols);
  var eqSubs = ['전기','냉각','코일','기타2'];
  eqSubs.forEach(function (k, i) {
    var groupTd = i === 0
      ? '<td class="td-group" rowspan="4">설비정지</td>'
      : '';
    tbody += '<tr>' + groupTd + makeRow(k, k, false, true) + '</tr>';
  });

  // 제통 세부
  tbody += sepRow(cols);
  var jetSubs = ['조건','사양','기타3'];
  jetSubs.forEach(function (k, i) {
    var groupTd = i === 0
      ? '<td class="td-group" rowspan="3">제통</td>'
      : '';
    tbody += '<tr>' + groupTd + makeRow(k, k, false, true) + '</tr>';
  });

  document.getElementById('tbody').innerHTML = tbody;
}

// ── CSV 내보내기 ──
function exportCSV() {
  if (allRows.length === 0) { showToast('먼저 조회하세요.'); return; }
  var eq    = document.getElementById('selEquip').value;
  var month = document.getElementById('selMonth').value;
  var year  = new Date().getFullYear();
  var rows  = document.getElementById('tbody').querySelectorAll('tr');
  var headers = ['구분1','구분2','합계'];
  var daysInMonth = new Date(year, parseInt(month), 0).getDate();
  for (var d = 1; d <= daysInMonth; d++) headers.push(d + '일');
  var lines = ['\uFEFF' + headers.join(',')];
  rows.forEach(function (tr) {
    if (tr.querySelector('.td-sep')) return;
    var cells = Array.from(tr.querySelectorAll('td')).map(function (td) {
      return '"' + td.textContent.trim().replace(/"/g,'""') + '"';
    });
    if (cells.length > 0) lines.push(cells.join(','));
  });
  var blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a'); a.href = url;
  a.download = 'Operating_Rate_' + eq + '_' + year + '_' + month + 'M.csv';
  a.click(); URL.revokeObjectURL(url);
  showToast('📥 CSV 내보내기 완료');
}

function setStatus(type, msg) {
  var dot  = document.getElementById('sDot');
  var text = document.getElementById('sText');
  dot.className = 'status-dot ' + (type === 'loading' ? 'dot-loading' : type === 'error' ? 'dot-error' : 'dot-ok');
  text.textContent = msg;
}
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function () { t.classList.remove('show'); }, 3000);
}
</script>
