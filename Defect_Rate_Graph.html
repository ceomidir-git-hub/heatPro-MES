<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>불량률 현황 | HeatPro MES</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; background: #f0f2f5; color: #222; min-height: 100vh; }

.top-bar { background: #1a3a5c; color: #fff; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
.top-bar h1 { font-size: clamp(13px,1.8vw,18px); font-weight: 700; letter-spacing: 1px; }
.top-bar .sub { font-size: clamp(10px,1.1vw,12px); opacity: 0.75; }

.search-panel { background: #fff; border-bottom: 2px solid #1a3a5c; padding: 9px 20px; display: flex; align-items: center; gap: 10px; flex-wrap: nowrap; }
.search-panel label { font-size: 13px; font-weight: 600; color: #1a3a5c; white-space: nowrap; }
.search-panel select { padding: 5px 10px; border: 1px solid #aaa; border-radius: 4px; font-size: 13px; font-family: inherit; }
.sep { color: #ccc; font-size: 18px; }
.btn-search { background: #1a3a5c; color: #fff; border: none; padding: 6px 18px; border-radius: 4px; font-size: 13px; font-family: inherit; cursor: pointer; font-weight: 600; white-space: nowrap; }
.btn-search:hover { background: #2a5a8c; }
.btn-pdf { background: #fff; color: #1a3a5c; border: 1.5px solid #1a3a5c; padding: 6px 14px; border-radius: 4px; font-size: 13px; font-family: inherit; cursor: pointer; font-weight: 600; white-space: nowrap; margin-left: auto; }
.btn-pdf:hover { background: #e8ecf5; }

.container { padding: 16px; max-width: 1400px; margin: 0 auto; }
.card { background: #fff; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 16px; overflow: hidden; }
.card-title { background: #1a3a5c; color: #fff; padding: 8px 16px; font-size: clamp(12px,1.4vw,14px); font-weight: 700; display: flex; justify-content: space-between; align-items: center; }
.card-title .target { font-size: 12px; font-weight: 400; opacity: 0.85; }
.card-body { padding: 12px; }
.chart-wrap { position: relative; width: 100%; height: clamp(200px,28vw,300px); }

.tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table { width: 100%; border-collapse: collapse; font-size: clamp(9px,1vw,11px); min-width: 1170px; table-layout: fixed; }
th, td { border: 1px solid #ccc; text-align: center; padding: 4px 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
thead th { background: #1a3a5c; color: #fff; font-weight: 600; }
.th-holiday { color: #ff2222 !important; font-weight: 700 !important; }
.th-none    { background: #cccccc !important; color: #999 !important; }
.td-holiday { background: #fff5f5 !important; }
.td-none    { background: #eeeeee !important; color: #bbb !important; }
td.col-label { background: #f5f7fa; font-weight: 600; color: #1a3a5c; text-align: left; padding-left: 5px; }
td.col-group { background: #e8ecf5; font-weight: 700; color: #1a3a5c; writing-mode: vertical-rl; text-orientation: mixed; transform: rotate(180deg); font-size: 10px; }
td.col-sub   { background: #f5f7fa; color: #1a3a5c; text-align: left; padding-left: 12px; }
td.total-col { background: #fff8e1 !important; font-weight: 700; }
tr.row-ppm td { color: #cc0000; font-weight: 700; }
td.td-bad { background: #fff5f5 !important; color: #cc0000 !important; font-weight: 700 !important; }

.legend { display: flex; gap: 16px; font-size: 11px; margin-bottom: 8px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-dot { width: 12px; height: 12px; border-radius: 2px; display: inline-block; }
.legend-dot.holiday { background: #ff2222; }
.legend-dot.none    { background: #cccccc; }

.status-box { text-align: center; padding: 40px; color: #888; font-size: 14px; }
.status-box.error { color: #c00; }
.spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid #ddd; border-top-color: #1a3a5c; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }

@media print {
  @page { size: A4 landscape; margin: 5mm 7mm; }
  html, body { background: #fff; height: auto; }
  .search-panel, .btn-pdf { display: none !important; }

  .top-bar { padding: 4px 10px; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .top-bar h1 { font-size: 12px; }
  .top-bar .sub { font-size: 8px; }

  .container { padding: 0; max-width: 100%; }

  .card { box-shadow: none; border: 1px solid #ccc; margin-bottom: 4px; page-break-inside: avoid; break-inside: avoid; }
  .card-title { padding: 3px 8px; font-size: 10px; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .card-body { padding: 4px 6px; }

  /* 차트 높이를 인쇄 전용으로 확대 (테이블을 더 압축해서 공간 확보) */
  .chart-wrap { height: 260px !important; }
  /* 인쇄 시: canvas 숨기고 정적 이미지로 대체 (body.is-printing 클래스 기준) */
  body.is-printing #myChart { display: none !important; }
  body.is-printing #chartPrintImg { display: block !important; }

  /* 테이블 인쇄용 초축소 폰트 */
  table { font-size: 6.8px !important; min-width: 0 !important; width: 100% !important; }
  th, td { padding: 1px 1px !important; line-height: 1.2; }
  .legend { font-size: 7px; margin-bottom: 2px; }
  .legend-dot { width: 8px; height: 8px; }
  .tbl-wrap { overflow: visible !important; }

  thead th { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  td.col-group, td.col-label, td.col-sub, td.total-col { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .td-holiday, .td-none, .td-bad { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

  /* 페이지 넘침 방지: 전체를 한 장 안에 강제 압축 */
  .container, .card, .card-body, .tbl-wrap, table { page-break-after: avoid; }
}
</style>
</head>
<body>

<div class="top-bar">
  <h1>📉 불량률 현황 (Defect Rate Graph)</h1>
  <span class="sub">HeatPro MES · AUTO-GENERATED DOCUMENTS · ISO 9001</span>
</div>

<div class="search-panel">
  <label>조회 월 :</label>
  <select id="selMonth">
    <option value="1">1월</option><option value="2">2월</option><option value="3">3월</option>
    <option value="4">4월</option><option value="5">5월</option><option value="6">6월</option>
    <option value="7">7월</option><option value="8">8월</option><option value="9">9월</option>
    <option value="10">10월</option><option value="11">11월</option><option value="12">12월</option>
  </select>
  <span class="sep">|</span>
  <label>설비명 :</label>
  <select id="selEquip"><option value="">전체</option></select>
  <button class="btn-search" onclick="loadData()">조 회</button>
  <button class="btn-pdf" onclick="printWithChartFix()">🖨️ PDF 저장</button>
</div>

<div class="container">
  <div class="card">
    <div class="card-title">
      <span id="chartTitle">불량률 현황</span>
      <span class="target">[목표 : 0 PPM]</span>
    </div>
    <div class="card-body">
      <div class="chart-wrap">
        <canvas id="myChart"></canvas>
        <img id="chartPrintImg" alt="불량률 차트" style="display:none; width:100%; height:100%; object-fit:contain;">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">일별 불량 현황 상세</div>
    <div class="card-body">
      <div class="legend">
        <div class="legend-item"><span class="legend-dot holiday"></span><span>토요일 · 일요일 · 공휴일</span></div>
        <div class="legend-item"><span class="legend-dot none"></span><span>해당 월 없는 날짜</span></div>
      </div>
      <div id="tableArea" class="tbl-wrap">
        <div class="status-box">조회 월과 설비명을 선택 후 조회하세요.</div>
      </div>
    </div>
  </div>
</div>

<script>
var API_URL = 'https://script.google.com/macros/s/AKfycbw3H6QfMJYTlR24IlZ-IOfk5GKml1RDm_f_CU4iSbhua-bREeVI14NIeaY3oU1sfdWVLA/exec';
var YEAR     = 2026;
var MAX_DAYS = 31;
var myChart  = null;

var HOLIDAYS = [
  '2026-01-01','2026-01-28','2026-01-29','2026-01-30','2026-03-01',
  '2026-05-05','2026-05-25','2026-06-06','2026-08-15',
  '2026-09-24','2026-09-25','2026-09-26','2026-10-03','2026-10-09','2026-12-25'
];

function getDaysInMonth(y, m) { return new Date(y, m, 0).getDate(); }
function getDow(y, m, d)      { return new Date(y, m - 1, d).getDay(); }
function isHoliday(y, m, d) {
  var dow = getDow(y, m, d);
  if (dow === 0 || dow === 6) return true;
  var k = y + '-' + (m < 10 ? '0' + m : '' + m) + '-' + (d < 10 ? '0' + d : '' + d);
  return HOLIDAYS.indexOf(k) >= 0;
}
function pad2(n) { return n < 10 ? '0' + n : '' + n; }

/* ── 인쇄 시 Chart.js 캔버스가 빈 화면으로 찍히는 문제 방지 ──
   원인: 인쇄 레이아웃 전환 시점에 캔버스가 비워지거나 크기가
   재계산되며 인쇄 렌더러가 차트를 제대로 캡처하지 못함.
   해결: 인쇄 직전 차트를 PNG(base64) 이미지로 캡처해서
   <img> 태그로 바꿔치기하고, 인쇄가 끝나면 다시 canvas로 복원. */
function printWithChartFix() {
  if (!myChart) { window.print(); return; }
  try {
    var dataUrl = myChart.toBase64Image('image/png', 1.0);
    var img = document.getElementById('chartPrintImg');
    img.src = dataUrl;
    document.body.classList.add('is-printing');
  } catch (e) {
    // 캡처 실패해도 인쇄는 진행
  }
  setTimeout(function () { window.print(); }, 60);
}

window.addEventListener('beforeprint', function () {
  if (!myChart) return;
  // Ctrl+P 등 버튼을 거치지 않고 직접 호출된 경우 대비
  var img = document.getElementById('chartPrintImg');
  if (img && !img.src) {
    try { img.src = myChart.toBase64Image('image/png', 1.0); } catch (e) {}
  }
  document.body.classList.add('is-printing');
});
window.addEventListener('afterprint', function () {
  document.body.classList.remove('is-printing');
});

window.onload = function () {
  var sel = document.getElementById('selMonth');
  sel.value = new Date().getMonth() + 1;
  loadMeta();
};

function loadMeta() {
  var cb = 'cbMeta_' + Date.now();
  var sc = document.createElement('script');
  sc.src = API_URL + '?callback=' + cb;
  window[cb] = function (data) {
    document.head.removeChild(sc); delete window[cb];
    var eqSel = document.getElementById('selEquip');
    var eqArr = data.equipment || [];
    eqArr.forEach(function (e) {
      var name = typeof e === 'object' ? (e.name || e) : e;
      if (name) eqSel.add(new Option(name, name));
    });
  };
  sc.onerror = function () { document.head.removeChild(sc); delete window[cb]; };
  document.head.appendChild(sc);
}

function loadData() {
  var month = parseInt(document.getElementById('selMonth').value);
  var equip = document.getElementById('selEquip').value;
  var eqLabel = equip || '전체';

  document.getElementById('chartTitle').textContent =
    '불량률 현황 ( ' + month + '월 ) — ' + eqLabel;
  document.getElementById('tableArea').innerHTML =
    '<div class="status-box"><div class="spinner"></div><br>데이터를 불러오는 중입니다...</div>';

  var old = document.getElementById('_gs_def');
  if (old) old.parentNode.removeChild(old);

  // from/to 로 해당 월 전체 범위 전달 (기존 getDefectRateRows 활용)
  var from = YEAR + '-' + pad2(month) + '-01';
  var days = getDaysInMonth(YEAR, month);
  var to   = YEAR + '-' + pad2(month) + '-' + pad2(days);

  var cbName = '_cbDef_' + Date.now();
  window[cbName] = function (json) {
    if (json.error) { showError(json.error); return; }
    processData(json.rows || [], month, equip);
  };

  var sc = document.createElement('script');
  sc.id  = '_gs_def';
  sc.src = API_URL + '?action=defectRate'
         + '&from='  + from
         + '&to='    + to
         + (equip ? '&equipment=' + encodeURIComponent(equip) : '')
         + '&callback=' + cbName;
  sc.onerror = function () { showError('스크립트 로드 실패. 네트워크를 확인하세요.'); };
  document.body.appendChild(sc);
}

function showError(msg) {
  document.getElementById('tableArea').innerHTML =
    '<div class="status-box error">⚠️ ' + msg + '</div>';
}

function processData(rows, month, equip) {
  var actualDays = getDaysInMonth(YEAR, month);

  // 일별 집계 배열 초기화 (hasData: 해당 일자에 실제 행이 존재했는지)
  var dayData = [];
  for (var i = 0; i < MAX_DAYS; i++) {
    dayData.push({ input: 0, good: 0, bad: 0, out: 0, cont: 0, scratch: 0, drop: 0, hard: 0, deform: 0, hasData: false });
  }

  rows.forEach(function (r) {
    var ds = String(r['작업일'] || '');
    var parts = ds.split('-');
    if (parts.length < 3) return;
    var d = parseInt(parts[2]);
    if (d < 1 || d > MAX_DAYS) return;
    var idx = d - 1;
    dayData[idx].input   += Number(r['투입수량'] || 0);
    dayData[idx].good    += Number(r['양품수량'] || 0);
    dayData[idx].bad     += Number(r['불량수량'] || 0);
    dayData[idx].out     += Number(r['외관']     || 0);
    dayData[idx].cont    += Number(r['오염']     || 0);
    dayData[idx].scratch += Number(r['찍힘']     || 0);
    dayData[idx].drop    += Number(r['탈락']     || 0);
    dayData[idx].hard    += Number(r['경도']     || 0);
    dayData[idx].deform  += Number(r['변형']     || 0);
    dayData[idx].hasData = true;
  });

  buildChart(dayData, month, actualDays);
  buildTable(dayData, month, actualDays);
}

function buildChart(dayData, month, actualDays) {
  var labels = [], ppmArr = [];
  for (var d = 1; d <= MAX_DAYS; d++) {
    labels.push(d <= actualDays ? String(d) : '');
    if (d <= actualDays) {
      var dd = dayData[d - 1];
      // 해당 일자에 실제 데이터가 없으면 null (선이 끊기고 빈 칸으로 표시됨)
      ppmArr.push(dd.hasData ? (dd.input > 0 ? Math.round(dd.bad / dd.input * 1000000) : 0) : null);
    } else {
      ppmArr.push(null);
    }
  }

  if (myChart) { myChart.destroy(); myChart = null; }
  var ctx = document.getElementById('myChart').getContext('2d');

  var maxPpm = Math.max.apply(null, ppmArr.filter(function(v){ return v !== null; }).concat([0]));
  var yMax   = Math.max(30000, Math.ceil(maxPpm * 1.3 / 5000) * 5000);
  var yMin   = -Math.round(yMax * 0.08);

  myChart = new Chart(ctx, {
    type: 'line',
    devicePixelRatio: 2,
    data: {
      labels: labels,
      datasets: [
        {
          label: '불량률(PPM)',
          data: ppmArr,
          borderColor: '#cc0000',
          backgroundColor: 'rgba(204,0,0,0.07)',
          borderWidth: 2,
          pointRadius: function(ctx) {
            return ctx.parsed && ctx.parsed.y !== null ? 4 : 0;
          },
          pointBackgroundColor: '#cc0000',
          pointBorderColor: '#fff',
          pointBorderWidth: 1.5,
          tension: 0,
          spanGaps: true,
          segment: {
            borderDash: function(ctx) {
              // 양쪽 끝 중 하나라도 null이었던 구간(보간 구간)은 점선으로 표시
              var p0 = ctx.p0.parsed, p1 = ctx.p1.parsed;
              var raw0 = ppmArr[ctx.p0DataIndex];
              var raw1 = ppmArr[ctx.p1DataIndex];
              return (raw0 === null || raw1 === null) ? [4, 4] : undefined;
            },
            borderColor: function(ctx) {
              var raw0 = ppmArr[ctx.p0DataIndex];
              var raw1 = ppmArr[ctx.p1DataIndex];
              return (raw0 === null || raw1 === null) ? '#bbb' : '#cc0000';
            }
          }
        },
        {
          label: '목표(0PPM)',
          data: Array(MAX_DAYS).fill(0),
          borderColor: '#1a3a5c',
          borderWidth: 1.5,
          borderDash: [6, 4],
          pointRadius: 0,
          tension: 0
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      resizeDelay: 0,
      clip: false,
      layout: { padding: { top: 24 } },
      scales: {
        x: { grid: { color: '#f0f0f0' }, ticks: { font: { size: 10 } } },
        y: {
          min: yMin,
          max: yMax,
          grid: { color: '#f0f0f0' },
          ticks: {
            font: { size: 10 },
            callback: function (v) {
              if (v < 0) return '';
              return v >= 1000 ? (v / 1000).toFixed(0) + 'k' : v;
            }
          }
        }
      },
      plugins: {
        legend: { position: 'top', labels: { font: { size: 11 }, boxWidth: 14 } },
        tooltip: {
          callbacks: {
            label: function (ctx) {
              return ctx.dataset.label + ': ' +
                (ctx.parsed.y !== null ? ctx.parsed.y.toLocaleString() + ' PPM' : '—');
            }
          }
        }
      }
    },
    plugins: [{
      id: 'ppmLabel',
      afterDatasetsDraw: function (chart) {
        var ds   = chart.data.datasets[0];
        var meta = chart.getDatasetMeta(0);
        var c2   = chart.ctx;
        c2.save();
        c2.font      = 'bold 9px Malgun Gothic, sans-serif';
        c2.fillStyle = '#cc0000';
        c2.textAlign = 'center';
        meta.data.forEach(function (pt, i) {
          var v = ds.data[i];
          if (v === null || v === undefined || v === 0) return;
          c2.fillText(v.toLocaleString(), pt.x, pt.y - 10);
        });
        c2.restore();
      }
    }]
  });
}

function buildTable(dayData, month, actualDays) {
  // 열 너비 고정: 구분(2칸 분량), 합계, 날짜 31개
  var colgroup = '<colgroup>'
    + '<col style="width:3.76%">'   // 구분(불량 그룹)
    + '<col style="width:6.84%">'   // 구분(소항목/라벨)
    + '<col style="width:4.62%">';  // 합계
  for (var ci = 1; ci <= MAX_DAYS; ci++) {
    colgroup += '<col style="width:2.735%">';  // 날짜 31개 (합계 약 84.8%)
  }
  colgroup += '</colgroup>';

  // 헤더 행 — "구분"을 colspan=2로 병합 (바디 일반행과 동일 구조)
  var thRow = '<tr><th colspan="2">구분</th><th>합계</th>';
  for (var d = 1; d <= MAX_DAYS; d++) {
    if (d > actualDays) {
      thRow += '<th class="th-none">' + d + '</th>';
    } else if (isHoliday(YEAR, month, d)) {
      thRow += '<th class="th-holiday">' + d + '</th>';
    } else {
      thRow += '<th>' + d + '</th>';
    }
  }
  thRow += '</tr>';

  var ROWS = [
    { key: 'input',   label: '생산수량',    sub: false, ppm: false },
    { key: 'good',    label: '양품수량',    sub: false, ppm: false },
    { key: 'bad',     label: '불량수량',    sub: false, ppm: false },
    { key: 'ppm',     label: '불량률(PPM)', sub: false, ppm: true  },
    { key: 'out',     label: '외관',        sub: true,  ppm: false },
    { key: 'cont',    label: '오염',        sub: true,  ppm: false },
    { key: 'scratch', label: '찍힘',        sub: true,  ppm: false },
    { key: 'drop',    label: '탈락',        sub: true,  ppm: false },
    { key: 'hard',    label: '경도',        sub: true,  ppm: false },
    { key: 'deform',  label: '변형',        sub: true,  ppm: false },
    { key: 'badsum',  label: '불량합계',    sub: false, ppm: false },
    { key: 'ppm2',    label: '불량률(PPM)', sub: false, ppm: true  }
  ];

  var SUB_COUNT = 6;
  var html = '<table>' + colgroup + '<thead>' + thRow + '</thead><tbody>';

  ROWS.forEach(function (f, fi) {
    var isFirstSub = f.sub && (fi === 0 || !ROWS[fi - 1].sub);

    // 합계
    var total = 0;
    for (var d2 = 1; d2 <= actualDays; d2++) {
      total += getVal(dayData[d2 - 1], f.key);
    }

    html += '<tr' + (f.ppm ? ' class="row-ppm"' : '') + '>';

    // 구분열 — 일반 행은 colspan=2로 병합(라벨 잘림 방지), 불량 소항목 행만 분리 유지
    if (isFirstSub) {
      html += '<td class="col-group" rowspan="' + SUB_COUNT + '">불&nbsp;량</td>';
      html += '<td class="col-sub">' + f.label + '</td>';
    } else if (f.sub) {
      html += '<td class="col-sub">' + f.label + '</td>';
    } else {
      var labelStyle = f.ppm ? ' style="color:#cc0000;"' : '';
      html += '<td colspan="2" class="col-label"' + labelStyle + '>' + f.label + '</td>';
    }

    // 합계열
    var totBad = f.ppm ? total > 0 : (f.key === 'bad' || f.key === 'badsum') && total > 0;
    html += '<td class="total-col' + (totBad ? ' td-bad' : '') + '">' + total.toLocaleString() + '</td>';

    // 일별 셀
    for (var d3 = 1; d3 <= MAX_DAYS; d3++) {
      if (d3 > actualDays) {
        html += '<td class="td-none">—</td>';
        continue;
      }
      var dd3     = dayData[d3 - 1];
      var v       = getVal(dd3, f.key);
      var holiday = isHoliday(YEAR, month, d3);
      var hasData = dd3.hasData;
      var isBad   = hasData && ((f.ppm && v > 0) || ((f.key === 'bad' || f.key === 'badsum') && v > 0));
      var cls = [];
      if (holiday) cls.push('td-holiday');
      if (isBad)   cls.push('td-bad');
      html += '<td' + (cls.length ? ' class="' + cls.join(' ') + '"' : '') + '>';
      html += hasData ? v.toLocaleString() : '—';
      html += '</td>';
    }
    html += '</tr>';
  });

  html += '</tbody></table>';
  document.getElementById('tableArea').innerHTML = html;
}

function getVal(dd, key) {
  switch (key) {
    case 'input':   return dd.input;
    case 'good':    return dd.good;
    case 'bad':     return dd.bad;
    case 'ppm':
    case 'ppm2':    return dd.input > 0 ? Math.round(dd.bad / dd.input * 1000000) : 0;
    case 'out':     return dd.out;
    case 'cont':    return dd.cont;
    case 'scratch': return dd.scratch;
    case 'drop':    return dd.drop;
    case 'hard':    return dd.hard;
    case 'deform':  return dd.deform;
    case 'badsum':  return dd.out + dd.cont + dd.scratch + dd.drop + dd.hard + dd.deform;
    default:        return 0;
  }
}
</script>
