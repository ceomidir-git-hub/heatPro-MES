<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>입출고관리대장 | HeatPro MES</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue:     #185FA5;
  --blue-lt:  #E6F1FB;
  --blue-dk:  #0C447C;
  --green:    #3B6D11;
  --green-lt: #EAF3DE;
  --green-dk: #27500A;
  --amber:    #854F0B;
  --amber-lt: #FAEEDA;
  --amber-dk: #633806;
  --pink:     #993556;
  --pink-lt:  #FBEAF0;
  --pink-dk:  #72243E;
  --red:      #A32D2D;
  --red-lt:   #FCEBEB;
  --gray:     #5F5E5A;
  --gray-lt:  #F1EFE8;
  --gray-bd:  #D3D1C7;
  --bg:       #F8F7F4;
  --white:    #FFFFFF;
  --text:     #2C2C2A;
  --text-sub: #888780;
  --text-hi:  #444441;
}

body {
  font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  min-height: 100vh;
}

/* ── 상단 헤더 ── */
.top-header {
  background: var(--white);
  border-bottom: 1px solid var(--gray-bd);
  padding: 0 24px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 15px;
  font-weight: 700;
  color: var(--blue);
  text-decoration: none;
}
.logo svg { width: 20px; height: 20px; }
nav { display: flex; gap: 4px; }
nav a {
  font-size: 12px;
  color: var(--text-sub);
  text-decoration: none;
  padding: 5px 10px;
  border-radius: 6px;
  border: 1px solid transparent;
}
nav a:hover { background: var(--gray-lt); color: var(--text); }
nav a.active {
  background: var(--blue-lt);
  color: var(--blue-dk);
  border-color: #B5D4F4;
  font-weight: 500;
}

/* ── 레이아웃 ── */
.container {
  max-width: 1280px;
  margin: 0 auto;
  padding: 20px 20px 48px;
  width: 100%;
}

/* ── 페이지 타이틀 ── */
.page-title {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}
.page-title svg { width: 20px; height: 20px; color: var(--blue); flex-shrink: 0; }
.page-title h1 { font-size: 18px; font-weight: 700; }
.page-title .sub { font-size: 12px; color: var(--text-sub); }
.year-badge {
  margin-left: auto;
  background: var(--blue-lt);
  color: var(--blue-dk);
  font-size: 11px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 99px;
}

/* ── 필터 카드 ── */
.filter-card {
  background: var(--white);
  border: 1px solid var(--gray-bd);
  border-radius: 10px;
  padding: 13px 16px;
  margin-bottom: 12px;
}
.filter-section-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-sub);
  letter-spacing: .05em;
  margin-bottom: 9px;
}
.filter-row {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 8px;
}
.filter-row:last-child { margin-bottom: 0; }
.fg {
  display: flex;
  align-items: center;
  gap: 5px;
}
.fg label {
  font-size: 12px;
  color: var(--text-sub);
  white-space: nowrap;
  min-width: 44px;
}
.fg input[type="date"],
.fg select {
  height: 32px;
  border: 1px solid var(--gray-bd);
  border-radius: 6px;
  padding: 0 8px;
  font-size: 12px;
  color: var(--text);
  background: var(--white);
  outline: none;
}
.fg input[type="date"] { width: 130px; }
.fg select { width: 110px; }
.fg input:focus, .fg select:focus { border-color: var(--blue); }
.sep { color: var(--text-sub); font-size: 12px; }
.btn-row { display: flex; gap: 6px; margin-left: auto; }
.btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  height: 32px;
  padding: 0 13px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--gray-bd);
  background: var(--white);
  color: var(--text-sub);
  white-space: nowrap;
  transition: background .1s;
}
.btn:hover { background: var(--gray-lt); }
.btn svg { width: 14px; height: 14px; flex-shrink: 0; }
.btn-primary { background: var(--blue); color: #fff; border-color: var(--blue); }
.btn-primary:hover { background: var(--blue-dk); }

/* ── KPI 카드 ── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  margin-bottom: 12px;
}
.stat-card {
  background: var(--white);
  border: 1px solid var(--gray-bd);
  border-radius: 10px;
  padding: 12px 14px;
}
.s-label {
  font-size: 11px;
  color: var(--text-sub);
  display: flex;
  align-items: center;
  gap: 4px;
  white-space: nowrap;
  margin-bottom: 4px;
}
.s-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.s-val { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.3; white-space: nowrap; }
.s-unit { font-size: 11px; font-weight: 400; color: var(--text-sub); margin-left: 1px; }

/* ── 테이블 카드 ── */
.table-card {
  background: var(--white);
  border: 1px solid var(--gray-bd);
  border-radius: 10px;
  overflow: hidden;
}
.table-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  border-bottom: 1px solid var(--gray-bd);
}
.t-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 7px;
}
.t-title svg { width: 15px; height: 15px; }
.cnt-badge {
  background: var(--blue-lt);
  color: var(--blue-dk);
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 99px;
}
.table-wrap {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  table-layout: fixed;
  min-width: 900px;
}
/* colgroup 너비 */
col.c-no   { width: 32px; }
col.c-idate{ width: 88px; }
col.c-co   { width: 70px; }
col.c-prod { width: 66px; }
col.c-pn   { width: 64px; }
col.c-mat  { width: 52px; }
col.c-iqty { width: 50px; }
col.c-qt   { width: 72px; }
col.c-odate{ width: 88px; }
col.c-oqty { width: 50px; }
col.c-res  { width: 62px; }
col.c-cert { width: 52px; }
col.c-save { width: 50px; }

thead tr.gr th {
  padding: 7px 5px;
  text-align: center;
  font-size: 11px;
  font-weight: 600;
  border-bottom: 1px solid var(--gray-bd);
  border-right: 1px solid var(--gray-bd);
}
thead tr.gr th:last-child { border-right: none; }
thead tr.sr th {
  padding: 5px 5px;
  text-align: center;
  font-size: 11px;
  font-weight: 500;
  border-bottom: 1px solid var(--gray-bd);
  border-right: 1px solid var(--gray-bd);
}
thead tr.sr th:last-child { border-right: none; }

.th-no  { background: var(--gray-lt); color: var(--gray); }
.th-in  { background: var(--green-lt); color: var(--green-dk); }
.th-out { background: var(--amber-lt); color: var(--amber-dk); }
.th-chk { background: var(--pink-lt);  color: var(--pink-dk); }
.th-act { background: var(--gray-lt);  color: var(--gray); }
.sr-in  { background: #F4FAEE; color: var(--green); }
.sr-out { background: #FDF6EC; color: var(--amber); }
.sr-chk { background: #FEF3F7; color: var(--pink); }
.sr-no  { background: var(--gray-lt); color: var(--gray); }

tbody td {
  padding: 6px 4px;
  text-align: center;
  border-bottom: 1px solid #EEECEA;
  border-right: 1px solid #EEECEA;
  color: var(--text);
  overflow: hidden;
}
tbody td:last-child { border-right: none; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: #FAFAF8; }

.td-no { color: var(--text-sub); font-size: 11px; }

/* 인라인 편집 input/select */
.td-input {
  border: 1px solid transparent;
  border-radius: 4px;
  padding: 2px 4px;
  font-size: 11px;
  width: 100%;
  background: transparent;
  color: var(--text);
  text-align: center;
  outline: none;
  font-family: inherit;
}
.td-input:hover { border-color: var(--gray-bd); background: var(--gray-lt); }
.td-input:focus { border-color: var(--blue); background: var(--white); box-shadow: 0 0 0 2px rgba(24,95,165,.1); }
.td-input::placeholder { color: var(--text-sub); }

/* 수정됨 표시 */
.td-input.modified { border-color: #EF9F27; background: #FAEEDA; }

/* 저장 버튼 */
.save-btn {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  height: 24px;
  padding: 0 7px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--blue);
  background: var(--blue-lt);
  color: var(--blue-dk);
  transition: background .1s;
}
.save-btn:hover { background: #B5D4F4; }
.save-btn svg { width: 12px; height: 12px; }
.save-btn.saving { opacity: .6; pointer-events: none; }
.save-btn.saved  { border-color: var(--green); background: var(--green-lt); color: var(--green-dk); }

/* 상태 바 */
.status-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  border-top: 1px solid var(--gray-bd);
  font-size: 11px;
  color: var(--text-sub);
}
.status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.dot-ok      { background: var(--green); }
.dot-loading { background: var(--amber); animation: pulse 1s infinite; }
.dot-error   { background: var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* 빈 상태 */
.empty-row td { padding: 40px; color: var(--text-sub); font-size: 13px; border: none !important; }

/* 토스트 */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--text-hi);
  color: #fff;
  font-size: 13px;
  padding: 10px 20px;
  border-radius: 8px;
  z-index: 9999;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
  white-space: nowrap;
}
.toast.show { opacity: 1; }

/* 반응형 */
@media (max-width: 1100px) {
  .stats-row { grid-template-columns: repeat(5, 1fr); }
}
@media (max-width: 768px) {
  .stats-row { grid-template-columns: repeat(5, 1fr); }
  .filter-row { flex-wrap: wrap; }
  .fg input[type="date"] { width: 110px; }
  nav a { padding: 4px 7px; font-size: 11px; }
  .page-title h1 { font-size: 16px; }
}
</style>
</head>
<body>

<!-- 상단 헤더 -->
<header class="top-header">
  <a class="logo" href="https://ceomidir-git-hub.github.io/heatPro-MES/">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
      <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
    </svg>
    HeatPro MES
  </a>
  <nav>
    <a href="https://ceomidir-git-hub.github.io/heatPro-MES/">대시보드</a>
    <a href="https://ceomidir-git-hub.github.io/heatPro-MES/GitHub_Worksheet.html">작업일보</a>
    <a href="https://ceomidir-git-hub.github.io/heatPro-MES/Monthly_Production_Record.html">월생산달성율</a>
    <a class="active" href="#">입출고관리대장</a>
  </nav>
</header>

<main class="container">

  <!-- 페이지 타이틀 -->
  <div class="page-title">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
      <rect x="9" y="3" width="6" height="4" rx="1"/>
      <line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/>
    </svg>
    <h1>입출고 관리대장</h1>
    <span class="sub">Inbound &amp; Outbound Management</span>
    <span class="year-badge">26년도</span>
  </div>

  <!-- 조회 필터 -->
  <div class="filter-card">
    <div class="filter-section-label">조회 조건</div>
    <div class="filter-row">
      <div class="fg">
        <label>조회 기간</label>
        <input type="date" id="fFrom" />
        <span class="sep">~</span>
        <input type="date" id="fTo" />
      </div>
      <div class="fg" style="margin-left:10px;">
        <label>입고일</label>
        <input type="date" id="fInDate" />
      </div>
      <div class="fg" style="margin-left:6px;">
        <label>출고일</label>
        <input type="date" id="fOutDate" />
      </div>
    </div>
    <div class="filter-row">
      <div class="fg">
        <label>고객사</label>
        <select id="fCompany">
          <option value="">전체</option>
        </select>
      </div>
      <div class="btn-row">
        <button class="btn" onclick="resetFilter()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
          초기화
        </button>
        <button class="btn btn-primary" onclick="applyFilter()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          조회
        </button>
      </div>
    </div>
  </div>

  <!-- KPI 카드 -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="s-label"><span class="s-dot" style="background:var(--blue)"></span>총 입고건수</div>
      <div class="s-val" id="kInCount">—<span class="s-unit">건</span></div>
    </div>
    <div class="stat-card">
      <div class="s-label"><span class="s-dot" style="background:var(--blue)"></span>총 입고수량</div>
      <div class="s-val" id="kInQty">—<span class="s-unit">ea</span></div>
    </div>
    <div class="stat-card">
      <div class="s-label"><span class="s-dot" style="background:var(--amber)"></span>총 출고건수</div>
      <div class="s-val" id="kOutCount">—<span class="s-unit">건</span></div>
    </div>
    <div class="stat-card">
      <div class="s-label"><span class="s-dot" style="background:var(--amber)"></span>총 출고수량</div>
      <div class="s-val" id="kOutQty">—<span class="s-unit">ea</span></div>
    </div>
    <div class="stat-card">
      <div class="s-label"><span class="s-dot" style="background:var(--green)"></span>검사 합격률</div>
      <div class="s-val" id="kPassRate">—<span class="s-unit">%</span></div>
    </div>
  </div>

  <!-- 테이블 -->
  <div class="table-card">
    <div class="table-toolbar">
      <span class="t-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/>
          <line x1="9" y1="3" x2="9" y2="21"/>
        </svg>
        입출고 내역
        <span class="cnt-badge" id="tCount">0건</span>
      </span>
      <button class="btn" onclick="exportCSV()" style="height:28px;font-size:12px;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px;">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        CSV 내보내기
      </button>
    </div>
    <div class="table-wrap">
      <table id="mainTable">
        <colgroup>
          <col class="c-no"/><col class="c-idate"/><col class="c-co"/><col class="c-prod"/>
          <col class="c-pn"/><col class="c-mat"/><col class="c-iqty"/><col class="c-qt"/>
          <col class="c-odate"/><col class="c-oqty"/><col class="c-res"/><col class="c-cert"/>
          <col class="c-save"/>
        </colgroup>
        <thead>
          <tr class="gr">
            <th rowspan="2" class="th-no">No</th>
            <th colspan="7" class="th-in">입고 관리</th>
            <th colspan="2" class="th-out">출고 관리</th>
            <th colspan="2" class="th-chk">검사 관리</th>
            <th rowspan="2" class="th-act">저장</th>
          </tr>
          <tr class="sr">
            <th class="sr-in">입고일</th>
            <th class="sr-in">고객사</th>
            <th class="sr-in">품명</th>
            <th class="sr-in">품번</th>
            <th class="sr-in">재질</th>
            <th class="sr-in">입고수량</th>
            <th class="sr-in">외관열처리(QT)</th>
            <th class="sr-out">출고일</th>
            <th class="sr-out">출고수량</th>
            <th class="sr-chk">검사결과</th>
            <th class="sr-chk">성적서</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr class="empty-row"><td colspan="13">데이터를 불러오는 중...</td></tr>
        </tbody>
      </table>
    </div>
    <div class="status-bar">
      <span class="status-dot dot-loading" id="sDot"></span>
      <span id="sText">데이터 로드 중...</span>
    </div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script>
var API_URL = 'https://script.google.com/macros/s/AKfycbw3H6QfMJYTlR24IlZ-IOfk5GKml1RDm_f_CU4iSbhua-bREeVI14NIeaY3oU1sfdWVLA/exec';

var allRows = [];
var filteredRows = [];

/* ── 초기화 ── */
window.onload = function () {
  setDefaultDates();
  loadDropdowns();
  loadData();
};

function setDefaultDates() {
  var today = new Date();
  var y = today.getFullYear();
  var m = String(today.getMonth() + 1).padStart(2, '0');
  var d = String(today.getDate()).padStart(2, '0');
  document.getElementById('fFrom').value = y + '-' + m + '-01';
  document.getElementById('fTo').value   = y + '-' + m + '-' + d;
}

/* ── 드롭다운 로드 (doGet 기본 응답) ── */
function loadDropdowns() {
  var cb = 'cbDrop_' + Date.now();
  var sc = document.createElement('script');
  sc.src = API_URL + '?callback=' + cb;
  window[cb] = function (data) {
    document.head.removeChild(sc);
    delete window[cb];
    if (!data) return;
    var sel = document.getElementById('fCompany');
    var list = data.customers || [];
    list.forEach(function (c) {
      var name = typeof c === 'string' ? c : (c.name || c[0] || '');
      if (name) sel.add(new Option(name, name));
    });
  };
  sc.onerror = function () { document.head.removeChild(sc); delete window[cb]; };
  document.head.appendChild(sc);
}

/* ── 입출고 데이터 로드 (JSONP) ── */
function loadData() {
  setStatus('loading', '데이터 불러오는 중...');
  var cb = 'cbInOut_' + Date.now();
  var sc = document.createElement('script');
  sc.src = API_URL + '?action=inout&callback=' + cb;

  window[cb] = function (data) {
    document.head.removeChild(sc);
    delete window[cb];
    allRows = (data && data.rows) ? data.rows : [];
    applyFilter();
    setStatus('ok', '데이터 로드 완료 · 총 ' + allRows.length + '건');
  };

  sc.onerror = function () {
    document.head.removeChild(sc);
    delete window[cb];
    allRows = [];
    renderTable([]);
    setStatus('error', 'API 연결 실패 — Code.gs의 action=inout 분기를 확인하세요.');
  };

  document.head.appendChild(sc);

  setTimeout(function () {
    if (window[cb]) {
      document.head.removeChild(sc);
      delete window[cb];
      allRows = [];
      renderTable([]);
      setStatus('error', '응답 시간 초과 (10초) — 네트워크 또는 Apps Script를 확인하세요.');
    }
  }, 10000);
}

/* ── 필터 ── */
function applyFilter() {
  var from    = document.getElementById('fFrom').value;
  var to      = document.getElementById('fTo').value;
  var inDate  = document.getElementById('fInDate').value;
  var outDate = document.getElementById('fOutDate').value;
  var company = document.getElementById('fCompany').value;

  filteredRows = allRows.filter(function (r) {
    if (from    && r.입고일 && r.입고일 < from)    return false;
    if (to      && r.입고일 && r.입고일 > to)      return false;
    if (inDate  && r.입고일 !== inDate)            return false;
    if (outDate && r.출고일 !== outDate)           return false;
    if (company && r.고객사 !== company)           return false;
    return true;
  });

  renderTable(filteredRows);
  updateKPI(filteredRows);
}

function resetFilter() {
  setDefaultDates();
  document.getElementById('fInDate').value  = '';
  document.getElementById('fOutDate').value = '';
  document.getElementById('fCompany').value = '';
  applyFilter();
}

/* ── 테이블 렌더링 ── */
var QT_OPTS   = ['양호', '미실시', '불량'];
var RES_OPTS  = ['양호', '불량', '대기'];
var CERT_OPTS = ['합격', '반려', '대기'];

function certBadge(v) {
  var val = v || '대기';
  var cls = val === '합격' ? 'b-pass' : val === '불합격' ? 'b-fail' : 'b-wait';
  return '<td><span class="badge ' + cls + ' cert-badge">' + val + '</span></td>';
}

function renderTable(rows) {
  document.getElementById('tCount').textContent = rows.length + '건';
  var tbody = document.getElementById('tbody');

  if (rows.length === 0) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="13">조회된 데이터가 없습니다.</td></tr>';
    return;
  }

  tbody.innerHTML = rows.map(function (r, i) {
    return '<tr data-idx="' + i + '">' +
      '<td class="td-no">' + (i + 1) + '</td>' +
      tdInput('입고일',   r.입고일,   'date', i) +
      tdInput('고객사',   r.고객사,   'text', i) +
      tdInput('품명',     r.품명,     'text', i) +
      tdInput('품번',     r.품번,     'text', i) +
      tdInput('재질',     r.재질,     'text', i) +
      tdInput('입고수량', r.입고수량, 'number', i) +
      tdSelect('외관열처리', r.외관열처리 || '미실시', QT_OPTS, i) +
      tdInput('출고일',   r.출고일,   'date', i) +
      tdInput('출고수량', r.출고수량, 'number', i) +
      tdSelect('검사결과', r.검사결과 || '대기', RES_OPTS, i) +
      certBadge(r.성적서) +
      '<td><button class="save-btn" id="sbtn-' + i + '" onclick="saveRow(' + i + ')">' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px;"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>' +
        '저장</button></td>' +
    '</tr>';
  }).join('');
}

function tdInput(field, val, type, idx) {
  var v = val === undefined || val === null ? '' : val;
  return '<td><input class="td-input" type="' + type + '" value="' + esc(v) + '"' +
    (v === '' && type === 'date' ? ' placeholder="미입력"' : '') +
    ' data-field="' + field + '" data-idx="' + idx + '"' +
    ' oninput="markModified(this)"' +
    (type === 'number' ? ' min="0"' : '') +
    ' /></td>';
}

function tdSelect(field, val, opts, idx) {
  var options = opts.map(function (o) {
    return '<option' + (o === val ? ' selected' : '') + '>' + o + '</option>';
  }).join('');
  var extra = field === '검사결과' ? ' onchange="markModified(this);syncCert(this,idx)"' : ' onchange="markModified(this)"';
  return '<td><select class="td-input" data-field="' + field + '" data-idx="' + idx + '"' +
    extra + '>' + options + '</select></td>';
}

function esc(v) {
  return String(v).replace(/"/g, '&quot;').replace(/</g, '&lt;');
}

function markModified(el) {
  el.classList.add('modified');
}

function syncCert(el, idx) {
  var val     = el.value;
  var certMap = { '양호': '합격', '불량': '불합격', '대기': '대기' };
  var certVal = certMap[val] || '대기';
  var cls     = certVal === '합격' ? 'b-pass' : certVal === '불합격' ? 'b-fail' : 'b-wait';
  var tr = document.querySelector('tr[data-idx="' + idx + '"]');
  if (!tr) return;
  var certSpan = tr.querySelector('.cert-badge');
  if (!certSpan) return;
  certSpan.className = 'badge ' + cls + ' cert-badge';
  certSpan.textContent = certVal;
}

/* ── 행 저장 (doPost) ── */
function saveRow(idx) {
  var tr  = document.querySelector('tr[data-idx="' + idx + '"]');
  var btn = document.getElementById('sbtn-' + idx);
  var row = filteredRows[idx];

  var payload = { action: 'updateInOut', rowIndex: row._rowIndex };
  tr.querySelectorAll('[data-field]').forEach(function (el) {
    payload[el.dataset.field] = el.value;
  });

  btn.classList.add('saving');
  btn.textContent = '저장중';

  fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(payload)
  })
  .then(function (res) { return res.json(); })
  .then(function (data) {
    if (data.result === 'success') {
      tr.querySelectorAll('.td-input').forEach(function (el) { el.classList.remove('modified'); });
      btn.classList.remove('saving');
      btn.classList.add('saved');
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px;"><polyline points="20 6 9 17 4 12"/></svg>완료';
      showToast('✅ ' + (row.입고일 || '') + ' / ' + (row.고객사 || '') + ' 저장 완료');
      setTimeout(function () {
        btn.classList.remove('saved');
        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px;"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>저장';
      }, 2500);
    } else {
      btn.classList.remove('saving');
      btn.textContent = '저장';
      showToast('❌ 저장 실패: ' + (data.error || '알 수 없는 오류'));
    }
  })
  .catch(function () {
    btn.classList.remove('saving');
    btn.textContent = '저장';
    showToast('❌ 네트워크 오류 — 저장에 실패했습니다.');
  });
}

/* ── KPI 업데이트 ── */
function updateKPI(rows) {
  var inCount  = rows.length;
  var inQty    = rows.reduce(function (s, r) { return s + (Number(r.입고수량) || 0); }, 0);
  var outRows  = rows.filter(function (r) { return r.출고일; });
  var outCount = outRows.length;
  var outQty   = outRows.reduce(function (s, r) { return s + (Number(r.출고수량) || 0); }, 0);
  var chkRows  = rows.filter(function (r) { return r.검사결과 === '양호' || r.검사결과 === '불량'; });
  var passOk   = chkRows.filter(function (r) { return r.검사결과 === '양호'; }).length;
  var rate     = chkRows.length > 0 ? (passOk / chkRows.length * 100).toFixed(1) : '—';

  document.getElementById('kInCount').innerHTML  = inCount + '<span class="s-unit">건</span>';
  document.getElementById('kInQty').innerHTML    = inQty.toLocaleString() + '<span class="s-unit">ea</span>';
  document.getElementById('kOutCount').innerHTML = outCount + '<span class="s-unit">건</span>';
  document.getElementById('kOutQty').innerHTML   = outQty.toLocaleString() + '<span class="s-unit">ea</span>';
  document.getElementById('kPassRate').innerHTML = rate + '<span class="s-unit">%</span>';
}

/* ── CSV 내보내기 (조회된 데이터 기준) ── */
function exportCSV() {
  if (filteredRows.length === 0) { showToast('내보낼 데이터가 없습니다.'); return; }

  var headers = ['No','입고일','고객사','품명','품번','재질','입고수량','외관열처리(QT)','출고일','출고수량','검사결과','성적서'];
  var lines = ['\uFEFF' + headers.join(',')];

  var tbody = document.getElementById('tbody');
  var trs = tbody.querySelectorAll('tr[data-idx]');
  trs.forEach(function (tr, i) {
    var cells = [i + 1];
    tr.querySelectorAll('[data-field]').forEach(function (el) {
      cells.push('"' + String(el.value).replace(/"/g, '""') + '"');
    });
    lines.push(cells.join(','));
  });

  var blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href     = url;
  a.download = 'InOut_Management_Log_' + new Date().toISOString().slice(0, 10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
  showToast('📥 CSV 내보내기 완료 (' + filteredRows.length + '건)');
}

/* ── 공통 유틸 ── */
function setStatus(type, msg) {
  var dot  = document.getElementById('sDot');
  var text = document.getElementById('sText');
  dot.className = 'status-dot ' + (type === 'loading' ? 'dot-loading' : type === 'error' ? 'dot-error' : 'dot-ok');
  text.textContent = msg;
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function () { t.classList.remove('show'); }, 3000);
}
</script>
