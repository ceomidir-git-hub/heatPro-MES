<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>월생산달성율 | HeatPro MES</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; background: #f0f2f5; color: #222; min-height: 100vh; }
.top-bar { background: #1a3a5c; color: #fff; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
.top-bar h1 { font-size: clamp(14px,2vw,20px); font-weight: 700; letter-spacing: 1px; }
.top-bar .sub { font-size: clamp(11px,1.2vw,13px); opacity: 0.75; }
.search-panel { background: #fff; border-bottom: 2px solid #1a3a5c; padding: 10px 20px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.search-panel label { font-size: 13px; font-weight: 600; color: #1a3a5c; }
.search-panel select { padding: 5px 10px; border: 1px solid #aaa; border-radius: 4px; font-size: 13px; font-family: inherit; }
.btn-search { background: #1a3a5c; color: #fff; border: none; padding: 6px 18px; border-radius: 4px; font-size: 13px; font-family: inherit; cursor: pointer; font-weight: 600; }
.btn-search:hover { background: #2a5a8c; }
.container { padding: 16px; }
.card { background: #fff; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 16px; overflow: hidden; }
.card-title { background: #1a3a5c; color: #fff; padding: 8px 16px; font-size: clamp(13px,1.5vw,15px); font-weight: 700; display: flex; justify-content: space-between; align-items: center; }
.card-title .target { font-size: 12px; font-weight: 400; opacity: 0.85; }
.card-body { padding: 12px; }
.chart-wrap { position: relative; width: 100%; height: clamp(200px,30vw,320px); }
.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: clamp(10px,1.1vw,13px); min-width: 1000px; }
th, td { border: 1px solid #ccc; text-align: center; padding: 4px 3px; white-space: nowrap; }
thead th { background: #1a3a5c; color: #fff; font-weight: 600; }
.th-holiday { color: #ff2222 !important; font-weight: 700 !important; }
.td-holiday { background: #fff5f5 !important; }
.th-none { background: #cccccc !important; color: #999 !important; }
.td-none { background: #eeeeee !important; color: #bbb !important; }
td.col-label { background: #f5f7fa; font-weight: 600; color: #1a3a5c; }
td.col-group { background: #e8ecf5; font-weight: 700; color: #1a3a5c; }
td.col-sub   { background: #f5f7fa; font-weight: 600; color: #1a3a5c; }
td.total-col { background: #fff8e1 !important; font-weight: 700; color: #333; }
tr.row-diff td { color: #1a3a5c; }
tr.row-rate td { color: #cc0000; font-weight: 700; }
.legend { display: flex; gap: 16px; font-size: 11px; margin-bottom: 8px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-dot { width: 12px; height: 12px; border-radius: 2px; display: inline-block; }
.legend-dot.holiday { background: #ff2222; }
.legend-dot.none { background: #cccccc; }
.status-box { text-align: center; padding: 40px; color: #888; font-size: 14px; }
.status-box.error { color: #c00; }
.spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid #ddd; border-top-color: #1a3a5c; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="top-bar">
  <h1>📊 월생산달성율 (Monthly Production Achievement)</h1>
  <span class="sub">HeatPro MES · AUTO-GENERATED DOCUMENTS · ISO 9001</span>
</div>

<div class="search-panel">
  <label>조회 월 :</label>
  <select id="selMonth">
    <option value="1">1월</option><option value="2">2월</option><option value="3">3월</option>
    <option value="4">4월</option><option value="5">5월</option><option value="6" selected>6월</option>
    <option value="7">7월</option><option value="8">8월</option><option value="9">9월</option>
    <option value="10">10월</option><option value="11">11월</option><option value="12">12월</option>
  </select>
  <button class="btn-search" onclick="loadData()">조 회</button>
</div>

<div class="container">
  <div class="card">
    <div class="card-title">
      <span id="chartTitle">생산실적 달성율 현황 ( 6월 )</span>
      <span class="target">[목표 : 90%]</span>
    </div>
    <div class="card-body">
      <div class="chart-wrap"><canvas id="myChart"></canvas></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">월별 생산실적 상세</div>
    <div class="card-body">
      <div class="legend">
        <div class="legend-item"><span class="legend-dot holiday"></span><span>토요일 · 일요일 · 공휴일</span></div>
        <div class="legend-item"><span class="legend-dot none"></span><span>해당 월 없는 날짜</span></div>
      </div>
      <div id="tableArea" class="tbl-wrap">
        <div class="status-box"><div class="spinner"></div><br>데이터를 불러오는 중입니다...</div>
      </div>
    </div>
  </div>
</div>

<script>
var API_URL  = 'https://script.google.com/macros/s/AKfycbw3H6QfMJYTlR24IlZ-IOfk5GKml1RDm_f_CU4iSbhua-bREeVI14NIeaY3oU1sfdWVLA/exec';
var YEAR     = 2026;
var TARGET   = 90;
var MAX_DAYS = 31;
var myChart  = null;
var currentMonth = 6;

var HOLIDAYS = ['2026-01-01','2026-01-28','2026-01-29','2026-01-30','2026-03-01',
  '2026-05-05','2026-05-25','2026-06-06','2026-08-15',
  '2026-09-24','2026-09-25','2026-09-26','2026-10-03','2026-10-09','2026-12-25'];

function getDaysInMonth(y,m){ return new Date(y,m,0).getDate(); }
function getDow(y,m,d){ return new Date(y,m-1,d).getDay(); }
function isHoliday(y,m,d){
  var dow=getDow(y,m,d);
  if(dow===0||dow===6) return true;
  var k=y+'-'+(m<10?'0'+m:''+m)+'-'+(d<10?'0'+d:''+d);
  return HOLIDAYS.indexOf(k)>=0;
}

function loadData(){
  currentMonth=parseInt(document.getElementById('selMonth').value);
  document.getElementById('chartTitle').textContent='생산실적 달성율 현황 ( '+currentMonth+'월 )';
  document.getElementById('tableArea').innerHTML=
    '<div class="status-box"><div class="spinner"></div><br>데이터를 불러오는 중입니다...</div>';
  var old=document.getElementById('_gs');
  if(old) old.parentNode.removeChild(old);
  window._cb=function(json){
    if(json.error){ showError(json.error); return; }
    processData(json.rawRows||[],currentMonth);
  };
  var s=document.createElement('script');
  s.id='_gs';
  s.src=API_URL+'?action=monthly&year='+YEAR+'&month='+currentMonth+'&callback=_cb';
  s.onerror=function(){ showError('스크립트 로드 실패. 네트워크를 확인하세요.'); };
  document.body.appendChild(s);
}

function showError(msg){
  document.getElementById('tableArea').innerHTML='<div class="status-box error">⚠️ '+msg+'</div>';
}

function processData(rows,month){
  var actualDays=getDaysInMonth(YEAR,month);
  var planArr=[],inputArr=[],resultArr=[];
  for(var i=0;i<MAX_DAYS;i++){planArr.push(0);inputArr.push(0);resultArr.push(0);}

  for(var ri=0;ri<rows.length;ri++){
    var row=rows[ri];
    var ds=row['작업일']||'';
    if(!ds) continue;
    var pts=ds.split('-');
    if(pts.length<3) continue;
    var y=parseInt(pts[0]),mo=parseInt(pts[1]),day=parseInt(pts[2]);
    if(y!==YEAR||mo!==month) continue;
    var idx=day-1;
    if(idx<0||idx>=MAX_DAYS) continue;
    planArr[idx]+=(Number(row['계획수량'])||0);
    inputArr[idx]+=(Number(row['투입수량'])||0);
    resultArr[idx]+=(Number(row['양품수량'])||0)+(Number(row['불량수량'])||0);
  }

  var totalPlan=0,totalInput=0,totalResult=0;
  for(var i=0;i<actualDays;i++){totalPlan+=planArr[i];totalInput+=inputArr[i];totalResult+=resultArr[i];}
  var totalDiff=totalInput-totalResult;
  var totalRate=totalInput>0?Math.round(totalResult/totalInput*1000)/10:null;

  var diffArr=[],rateArr=[];
  for(var i=0;i<MAX_DAYS;i++){
    diffArr.push(i<actualDays&&inputArr[i]>0?inputArr[i]-resultArr[i]:null);
    rateArr.push(i<actualDays&&inputArr[i]>0?Math.round(resultArr[i]/inputArr[i]*1000)/10:null);
  }

  renderChart(actualDays,month,rateArr,resultArr);
  renderTable(actualDays,month,planArr,inputArr,resultArr,diffArr,rateArr,
              totalPlan,totalInput,totalResult,totalDiff,totalRate);
}

function renderChart(actualDays,month,rateArr,resultArr){
  var labels=[],rateData=[],targetData=[],barData=[];
  for(var i=0;i<MAX_DAYS;i++){
    labels.push(i<actualDays?(i+1):'');
    rateData.push(i<actualDays&&rateArr[i]!==null?rateArr[i]:undefined);
    targetData.push(i<actualDays?TARGET:undefined);
    barData.push(i<actualDays&&resultArr[i]>0?resultArr[i]:undefined);
  }
  if(myChart) myChart.destroy();
  var ctx=document.getElementById('myChart').getContext('2d');
  myChart=new Chart(ctx,{
    type:'bar',  // 기본 type은 bar (혼합형 기준)
    data:{labels:labels,datasets:[
      // ① 생산실적 막대 (왼쪽 Y축)
      {
        type:'bar',
        label:'생산실적(ea)',
        data:barData,
        backgroundColor:'rgba(26,90,140,0.5)',
        borderColor:'rgba(26,90,140,0.8)',
        borderWidth:1,
        yAxisID:'y2',
        order:2
      },
      // ② 달성율 꺾은선 (오른쪽 Y축)
      {
        type:'line',
        label:'달성율(%)',
        data:rateData,
        borderColor:'#cc0000',
        backgroundColor:'rgba(204,0,0,0.05)',
        borderWidth:2,
        pointBackgroundColor:'#cc0000',
        pointRadius:4,
        pointHoverRadius:6,
        tension:0,
        spanGaps:false,
        yAxisID:'y',
        order:1
      },
      // ③ 목표선 꺾은선 (오른쪽 Y축)
      {
        type:'line',
        label:'목표('+TARGET+'%)',
        data:targetData,
        borderColor:'#aaa',
        borderWidth:1,
        borderDash:[6,3],
        pointRadius:0,
        tension:0,
        yAxisID:'y',
        order:3
      }
    ]},
    options:{
      responsive:true,
      maintainAspectRatio:false,
      interaction:{ mode:'index', intersect:false },
      plugins:{
        legend:{position:'top',labels:{font:{size:11}}},
        tooltip:{callbacks:{
          label:function(c){
            if(c.dataset.label==='생산실적(ea)') return c.dataset.label+': '+(c.parsed.y!==undefined?Number(c.parsed.y).toLocaleString()+'ea':'-');
            return c.dataset.label+': '+(c.parsed.y!==undefined?c.parsed.y+'%':'-');
          }
        }}
      },
      scales:{
        x:{
          title:{display:true,text:'일(Day)',font:{size:11}},
          ticks:{font:{size:10}},
          grid:{color:'#eee'}
        },
        // 오른쪽 Y축 — 달성율(%)
        y:{
          position:'right',
          min:0, max:120,
          title:{display:true,text:'달성율(%)',font:{size:11}},
          ticks:{font:{size:10},callback:function(v){return v+'%';}},
          grid:{color:'#eee'}
        },
        // 왼쪽 Y축 — 생산실적(ea)
        y2:{
          position:'left',
          min:0,
          title:{display:true,text:'생산실적(ea)',font:{size:11}},
          ticks:{font:{size:10},callback:function(v){return Number(v).toLocaleString();}},
          grid:{drawOnChartArea:false}  // 격자선 중복 방지
        }
      }
    },
    plugins:[{
      id:'lbl',
      afterDatasetsDraw:function(chart){
        // 달성율 꺾은선 레이블
        var ds=chart.data.datasets[1];
        var meta=chart.getDatasetMeta(1);
        var c2=chart.ctx;
        c2.save();
        c2.font='bold 10px Malgun Gothic';
        c2.fillStyle='#cc0000';
        c2.textAlign='center';
        meta.data.forEach(function(pt,i){
          var v=ds.data[i];
          if(v!==undefined&&v!==null) c2.fillText(v+'%',pt.x,pt.y-8);
        });
        c2.restore();
      }
    }]
  });
}

function renderTable(actualDays,month,planArr,inputArr,resultArr,diffArr,rateArr,
                     totalPlan,totalInput,totalResult,totalDiff,totalRate){
  var fmt=function(v){return(v===null||v===undefined||v===0)?'':Number(v).toLocaleString();};
  var fmtR=function(v){return(v===null||v===undefined)?'':v+'%';};

  /*
   * 최종 열 구조:
   * 헤더  : [구분] [합계] [1]~[31]  → 총 33열
   * 일반행: [라벨(colspan없음)] [합계] [1]~[31]  → 총 33열
   * 실적행: [실적(rowspan3)] [생산실적] [합계] [1]~[31]  → 총 33열
   *         (rowspan3이 구분 1칸을 차지하고 나머지 32칸이 이어짐)
   *
   * ※ 헤더를 [구분][항목][합계]로 3열로 만들면
   *   일반행도 3열이 돼서 항목열이 생기는 문제 발생.
   *   따라서 헤더는 [구분][합계]로 2열만 두고,
   *   실적행만 내부에서 [실적][생산실적]을 붙여 처리.
   */

  // ── 헤더: 구분 + 합계 + 1~31 (총 33열) ──
  var hdr='<th>구분</th><th class="total-col" style="color:#fff;">합계</th>';
  for(var d=1;d<=MAX_DAYS;d++){
    if(d<=actualDays){
      var cls=isHoliday(YEAR,month,d)?'th-holiday':'';
      hdr+='<th class="'+cls+'">'+d+'</th>';
    } else {
      hdr+='<th class="th-none">'+d+'</th>';
    }
  }

  // ── 데이터 셀: 합계 + 31일 (총 32셀) ──
  function dataCells(arr,total,isRate){
    var c='<td class="total-col">'+(isRate?fmtR(total):fmt(total))+'</td>';
    for(var i=0;i<MAX_DAYS;i++){
      var day=i+1;
      if(i<actualDays){
        var tc=isHoliday(YEAR,month,day)?'td-holiday':'';
        c+='<td class="'+tc+'">'+(isRate?fmtR(arr[i]):fmt(arr[i]))+'</td>';
      } else {
        c+='<td class="td-none"></td>';
      }
    }
    return c;
  }

  // ── 일반 행: 라벨(1셀) + dataCells(32셀) = 33셀 ──
  function makeRow(label,arr,total,isRate){
    return '<tr><td class="col-label">'+label+'</td>'+dataCells(arr,total,isRate)+'</tr>';
  }

  // ── 실적 그룹:
  //   생산실적행: [실적(rowspan3,1셀)] + [생산실적(1셀)] + dataCells(32셀) = 34셀?
  //   → 안됨. rowspan=3인 셀이 1열을 차지하므로
  //     나머지는 32셀만 있어야 33열이 됨.
  //   → [실적(rowspan3)] [생산실적] [합계] [1~31] = 1+1+1+31 = 34 → 오버!
  //
  //   해결: 헤더를 [구분][항목][합계][1~31] = 34열로 맞추고
  //   일반행은 [라벨(colspan=2)][합계][1~31] = 1+1+31+1 구조로.
  // ──────────────────────────────────────────────
  // 최종 결정: 헤더 34열, 일반행 colspan=2로 구분+항목 병합
  // ──────────────────────────────────────────────

  // 위 주석대로 헤더를 34열로 재구성
  hdr='<th colspan="2">구분</th><th class="total-col" style="color:#fff;">합계</th>';
  for(var d=1;d<=MAX_DAYS;d++){
    if(d<=actualDays){
      var cls=isHoliday(YEAR,month,d)?'th-holiday':'';
      hdr+='<th class="'+cls+'">'+d+'</th>';
    } else {
      hdr+='<th class="th-none">'+d+'</th>';
    }
  }

  // 일반행: [라벨(colspan=2)] + dataCells(32셀) = 34열
  function makeRow2(label,arr,total,isRate){
    return '<tr><td class="col-label" colspan="2">'+label+'</td>'+dataCells(arr,total,isRate)+'</tr>';
  }

  // 실적행: [실적(rowspan3,1셀)] + [생산실적(1셀)] + dataCells(32셀) = 34열
  var resultRows='';
  resultRows+='<tr>'
    +'<td class="col-group" rowspan="3">실적</td>'
    +'<td class="col-sub">생산실적</td>'
    +dataCells(resultArr,totalResult,false)
    +'</tr>';
  resultRows+='<tr class="row-diff">'
    +'<td class="col-sub">차이</td>'
    +dataCells(diffArr,totalDiff,false)
    +'</tr>';
  resultRows+='<tr class="row-rate">'
    +'<td class="col-sub">달성율(%)</td>'
    +dataCells(rateArr,totalRate,true)
    +'</tr>';

  var html='<table><thead><tr>'+hdr+'</tr></thead><tbody>';
  html+=makeRow2('월간생산계획',planArr,totalPlan,false);
  html+=makeRow2('생산계획',inputArr,totalInput,false);
  html+=resultRows;
  html+='</tbody></table>';

  document.getElementById('tableArea').innerHTML=html;
}

window.onload=function(){loadData();};
</script>
</body>
</html>
