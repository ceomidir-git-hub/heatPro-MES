<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>고객관리대장 | HeatPro MES</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--blue:#185FA5;--blue-lt:#E6F1FB;--blue-dk:#0C447C;--green:#3B6D11;--green-lt:#EAF3DE;--green-dk:#27500A;--amber:#854F0B;--amber-lt:#FAEEDA;--amber-dk:#633806;--red:#A32D2D;--red-lt:#FCEBEB;--gray:#5F5E5A;--gray-lt:#F1EFE8;--gray-bd:#D3D1C7;--bg:#F8F7F4;--white:#FFFFFF;--text:#2C2C2A;--text-sub:#888780;}
body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;}
.top-header{background:var(--white);border-bottom:1px solid var(--gray-bd);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:700;color:var(--blue);text-decoration:none;}
.logo svg{width:20px;height:20px;}
nav{display:flex;gap:4px;}
nav a{font-size:12px;color:var(--text-sub);text-decoration:none;padding:5px 10px;border-radius:6px;border:1px solid transparent;}
nav a:hover{background:var(--gray-lt);color:var(--text);}
nav a.active{background:var(--blue-lt);color:var(--blue-dk);border-color:#B5D4F4;font-weight:500;}
.container{max-width:1280px;margin:0 auto;padding:20px 20px 48px;width:100%;}
.page-title{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.page-title svg{width:20px;height:20px;color:var(--blue);flex-shrink:0;}
.page-title h1{font-size:18px;font-weight:700;}
.page-title .sub{font-size:12px;color:var(--text-sub);}
.year-badge{margin-left:auto;background:var(--blue-lt);color:var(--blue-dk);font-size:11px;font-weight:600;padding:3px 10px;border-radius:99px;}
.filter-card{background:var(--white);border:1px solid var(--gray-bd);border-radius:10px;padding:13px 16px;margin-bottom:12px;}
.filter-label{font-size:11px;font-weight:600;color:var(--text-sub);letter-spacing:.05em;margin-bottom:9px;}
.filter-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
.filter-row:last-child{margin-bottom:0;}
.fg{display:flex;align-items:center;gap:5px;}
.fg label{font-size:12px;color:var(--text-sub);white-space:nowrap;min-width:44px;}
.fg input[type="date"],.fg select{height:32px;border:1px solid var(--gray-bd);border-radius:6px;padding:0 8px;font-size:12px;color:var(--text);background:var(--white);outline:none;}
.fg input[type="date"]{width:130px;}
.fg select{width:120px;}
.sep{color:var(--text-sub);font-size:12px;}
.btn-row{display:flex;gap:6px;margin-left:auto;}
.btn{display:inline-flex;align-items:center;gap:4px;height:32px;padding:0 13px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--gray-bd);background:var(--white);color:var(--text-sub);transition:background .1s;}
.btn:hover{background:var(--gray-lt);}
.btn svg{width:14px;height:14px;}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue);}
.btn-primary:hover{background:var(--blue-dk);}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;}
.stat-card{background:var(--white);border:1px solid var(--gray-bd);border-radius:10px;padding:10px 12px;}
.s-label{font-size:11px;color:var(--text-sub);display:flex;align-items:center;gap:4px;margin-bottom:3px;white-space:nowrap;}
.s-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.s-val{font-size:16px;font-weight:700;color:var(--text);white-space:nowrap;}
.s-unit{font-size:11px;font-weight:400;color:var(--text-sub);margin-left:1px;}
.table-card{background:var(--white);border:1px solid var(--gray-bd);border-radius:10px;overflow:hidden;}
.table-toolbar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--gray-bd);}
.t-title{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:7px;}
.cnt-badge{background:var(--blue-lt);color:var(--blue-dk);font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px;}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed;min-width:900px;}
thead tr.gr th{padding:7px 5px;text-align:center;font-size:11px;font-weight:600;border-bottom:1px solid var(--gray-bd);border-right:1px solid var(--gray-bd);}
thead tr.gr th:last-child{border-right:none;}
thead tr.sr th{padding:5px;text-align:center;font-size:11px;font-weight:500;border-bottom:1px solid var(--gray-bd);border-right:1px solid var(--gray-bd);color:var(--text-sub);}
thead tr.sr th:last-child{border-right:none;}
.th-no{background:var(--gray-lt);color:var(--gray);width:32px;}
.th-main{background:var(--blue-lt);color:var(--blue-dk);}
.th-prod{background:var(--green-lt);color:var(--green-dk);}
.th-out{background:var(--amber-lt);color:var(--amber-dk);}
.th-act{background:var(--gray-lt);color:var(--gray);width:50px;}
.sr-main{background:#EEF7FD;color:var(--blue);}
.sr-prod{background:#F4FAEE;color:var(--green);}
.sr-out{background:#FDF6EC;color:var(--amber);}
tbody td{padding:6px 4px;text-align:center;border-bottom:1px solid #EEECEA;border-right:1px solid #EEECEA;color:var(--text);overflow:hidden;}
tbody td:last-child{border-right:none;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:#FAFAF8;}
.td-no{color:var(--text-sub);font-size:11px;}
.td-input{border:1px solid transparent;border-radius:4px;padding:2px 4px;font-size:11px;width:100%;background:transparent;color:var(--text);text-align:center;outline:none;font-family:inherit;}
.td-input:hover{border-color:var(--gray-bd);background:var(--gray-lt);}
.td-input:focus{border-color:var(--blue);background:var(--white);}
.td-input.modified{border-color:#EF9F27;background:#FAEEDA;}
.save-btn{display:inline-flex;align-items:center;gap:2px;height:24px;padding:0 7px;border-radius:4px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid var(--blue);background:var(--blue-lt);color:var(--blue-dk);}
.save-btn:hover{background:#B5D4F4;}
.save-btn.saved{border-color:var(--green);background:var(--green-lt);color:var(--green-dk);}
.empty-row td{padding:40px;color:var(--text-sub);font-size:13px;border:none!important;}
.status-bar{display:flex;align-items:center;gap:6px;padding:8px 14px;border-top:1px solid var(--gray-bd);font-size:11px;color:var(--text-sub);}
.status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.dot-ok{background:var(--green);}
.dot-loading{background:var(--amber);animation:pulse 1s infinite;}
.dot-error{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#2C2C2A;color:#fff;font-size:13px;padding:10px 20px;border-radius:8px;z-index:9999;opacity:0;pointer-events:none;transition:opacity .2s;white-space:nowrap;}
.toast.show{opacity:1;}
@media(max-width:768px){.stats-row{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>
<header class="top-header">
  <a class="logo" href="https://ceomidir-git-hub.github.io/heatPro-MES/">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    HeatPro MES
  </a>
  <nav>
    <a href="https://ceomidir-git-hub.github.io/heatPro-MES/">대시보드</a>
    <a href="https://ceomidir-git-hub.github.io/heatPro-MES/GitHub_Worksheet.html">작업일보</a>
    <a href="https://ceomidir-git-hub.github.io/heatPro-MES/InOut_Management_Log.html">입출고관리대장</a>
    <a class="active" href="#">고객관리대장</a>
  </nav>
</header>
<main class="container">
  <div class="page-title">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    <h1>고객관리대장</h1>
    <span class="sub">Customer Management Log</span>
    <span class="year-badge">26년도</span>
  </div>
  <div class="filter-card">
    <div class="filter-label">조회 조건</div>
    <div class="filter-row">
      <div class="fg"><label>조회 기간</label><input type="date" id="fFrom"/><span class="sep">~</span><input type="date" id="fTo"/></div>
      <div class="fg" style="margin-left:10px;"><label>고객사</label><select id="fCompany"><option value="">전체</option></select></div>
    </div>
    <div class="filter-row">
      <div class="btn-row">
        <button class="btn" onclick="resetFilter()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>초기화</button>
        <button class="btn btn-primary" onclick="applyFilter()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>조회</button>
      </div>
    </div>
  </div>
  <div class="stats-row">
    <div class="stat-card"><div class="s-label"><span class="s-dot" style="background:var(--blue)"></span>총 작업건수</div><div class="s-val" id="kCount">—<span class="s-unit">건</span></div></div>
    <div class="stat-card"><div class="s-label"><span class="s-dot" style="background:var(--green)"></span>총 양품수량</div><div class="s-val" id="kGood">—<span class="s-unit">ea</span></div></div>
    <div class="stat-card"><div class="s-label"><span class="s-dot" style="background:var(--amber)"></span>총 출고수량</div><div class="s-val" id="kOut">—<span class="s-unit">ea</span></div></div>
    <div class="stat-card"><div class="s-label"><span class="s-dot" style="background:var(--red)"></span>총 불량수량</div><div class="s-val" id="kBad">—<span class="s-unit">ea</span></div></div>
  </div>
  <div class="table-card">
    <div class="table-toolbar">
      <span class="t-title"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg>고객별 작업 내역<span class="cnt-badge" id="tCount">0건</span></span>
      <button class="btn" onclick="doExport()" style="height:28px;font-size:12px;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>CSV 내보내기</button>
    </div>
    <div class="table-wrap">
      <table>
        <colgroup><col style="width:32px"/><col style="width:86px"/><col style="width:72px"/><col style="width:68px"/><col style="width:64px"/><col style="width:52px"/><col style="width:56px"/><col style="width:56px"/><col style="width:56px"/><col style="width:56px"/><col style="width:86px"/><col style="width:56px"/><col style="width:50px"/></colgroup>
        <thead>
          <tr class="gr"><th rowspan="2" class="th-no">No</th><th colspan="5" class="th-main">고객 / 제품 정보</th><th colspan="4" class="th-prod">생산 실적</th><th colspan="2" class="th-out">출고</th><th rowspan="2" class="th-act">저장</th></tr>
          <tr class="sr"><th class="sr-main">작업일</th><th class="sr-main">고객사</th><th class="sr-main">품명</th><th class="sr-main">품번</th><th class="sr-main">재질</th><th class="sr-prod">계획수량</th><th class="sr-prod">투입수량</th><th class="sr-prod">양품수량</th><th class="sr-prod">불량수량</th><th class="sr-out">출고일</th><th class="sr-out">출고수량</th></tr>
        </thead>
        <tbody id="tbody"><tr class="empty-row"><td colspan="13">데이터를 불러오는 중...</td></tr></tbody>
      </table>
    </div>
    <div class="status-bar"><span class="status-dot dot-loading" id="sDot"></span><span id="sText">로드 중...</span></div>
  </div>
</main>
<div class="toast" id="toast"></div>
<script>
var API_URL='https://script.google.com/macros/s/AKfycbw3H6QfMJYTlR24IlZ-IOfk5GKml1RDm_f_CU4iSbhua-bREeVI14NIeaY3oU1sfdWVLA/exec';
var API_KEY='@qgis2026';
var allRows=[],filteredRows=[];

window.onload=function(){setDefaultDates();loadDropdowns();loadData();};
function setDefaultDates(){var t=new Date(),y=t.getFullYear(),m=String(t.getMonth()+1).padStart(2,'0'),d=String(t.getDate()).padStart(2,'0');document.getElementById('fFrom').value=y+'-'+m+'-01';document.getElementById('fTo').value=y+'-'+m+'-'+d;}
function loadDropdowns(){
  var cb='cbD_'+Date.now(),sc=document.createElement('script');sc.src=API_URL+'?key='+encodeURIComponent(API_KEY)+'&callback='+cb;
  window[cb]=function(data){document.head.removeChild(sc);delete window[cb];if(!data)return;var sel=document.getElementById('fCompany');(data.customers||[]).forEach(function(c){var n=typeof c==='string'?c:(c.name||c[0]||'');if(n)sel.add(new Option(n,n));});};
  sc.onerror=function(){document.head.removeChild(sc);delete window[cb];};document.head.appendChild(sc);
}
function loadData(){
  setStatus('loading','데이터 불러오는 중...');
  var cb='cbData_'+Date.now(),sc=document.createElement('script');sc.src=API_URL+'?action=customer&key='+encodeURIComponent(API_KEY)+'&callback='+cb;
  window[cb]=function(data){document.head.removeChild(sc);delete window[cb];allRows=(data&&data.rows)?data.rows:[];applyFilter();setStatus('ok','로드 완료 · 총 '+allRows.length+'건');};
  sc.onerror=function(){document.head.removeChild(sc);delete window[cb];allRows=[];renderTable([]);setStatus('error','API 연결 실패 — Code.gs에 action=customer 분기를 추가하세요.');};
  document.head.appendChild(sc);
  setTimeout(function(){if(window[cb]){document.head.removeChild(sc);delete window[cb];allRows=[];renderTable([]);setStatus('error','응답 시간 초과');}},10000);
}
function applyFilter(){
  var from=document.getElementById('fFrom').value,to=document.getElementById('fTo').value,company=document.getElementById('fCompany').value;
  filteredRows=allRows.filter(function(r){
    if(from&&r.작업일&&r.작업일<from)return false;
    if(to&&r.작업일&&r.작업일>to)return false;
    if(company&&r.고객사!==company)return false;
    return true;
  });
  renderTable(filteredRows);updateKPI(filteredRows);
}
function resetFilter(){setDefaultDates();document.getElementById('fCompany').value='';applyFilter();}
function renderTable(rows){
  document.getElementById('tCount').textContent=rows.length+'건';
  var tbody=document.getElementById('tbody');
  if(rows.length===0){tbody.innerHTML='<tr class="empty-row"><td colspan="13">조회된 데이터가 없습니다.</td></tr>';return;}
  tbody.innerHTML=rows.map(function(r,i){
    return '<tr data-idx="'+i+'">'
      +'<td class="td-no">'+(i+1)+'</td>'
      +tdInput('작업일',r.작업일,'date',i)
      +tdInput('고객사',r.고객사,'text',i)
      +tdInput('품명',r.품명,'text',i)
      +tdInput('품번',r.품번,'text',i)
      +tdInput('재질',r.재질,'text',i)
      +tdInput('계획수량',r.계획수량,'number',i)
      +tdInput('투입수량',r.투입수량,'number',i)
      +tdInput('양품수량',r.양품수량,'number',i)
      +tdInput('불량수량',r.불량수량,'number',i)
      +tdInput('출고일',r.출고일,'date',i)
      +tdInput('출고수량',r.출고수량,'number',i)
      +'<td><button class="save-btn" id="sbtn-'+i+'" onclick="saveRow('+i+')">저장</button></td>'
      +'</tr>';
  }).join('');
}
function updateKPI(rows){
  var good=rows.reduce(function(s,r){return s+(Number(r.양품수량)||0);},0);
  var bad=rows.reduce(function(s,r){return s+(Number(r.불량수량)||0);},0);
  var out=rows.reduce(function(s,r){return s+(Number(r.출고수량)||0);},0);
  document.getElementById('kCount').innerHTML=rows.length+'<span class="s-unit">건</span>';
  document.getElementById('kGood').innerHTML=good.toLocaleString()+'<span class="s-unit">ea</span>';
  document.getElementById('kOut').innerHTML=out.toLocaleString()+'<span class="s-unit">ea</span>';
  document.getElementById('kBad').innerHTML=bad.toLocaleString()+'<span class="s-unit">ea</span>';
}
function saveRow(idx){
  var tr=document.querySelector('tr[data-idx="'+idx+'"]'),btn=document.getElementById('sbtn-'+idx),row=filteredRows[idx];
  var payload={action:'updateRecord',key:API_KEY,rowIndex:row._rowIndex};
  tr.querySelectorAll('[data-field]').forEach(function(el){payload[el.dataset.field]=el.value;});
  btn.textContent='저장중';
  fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload)})
  .then(function(r){return r.json();})
  .then(function(data){if(data.result==='success'){tr.querySelectorAll('.td-input').forEach(function(el){el.classList.remove('modified');});btn.classList.add('saved');btn.textContent='완료';showToast('✅ 저장 완료');setTimeout(function(){btn.classList.remove('saved');btn.textContent='저장';},2500);}else{btn.textContent='저장';showToast('❌ 저장 실패: '+(data.error||''));}})
  .catch(function(){btn.textContent='저장';showToast('❌ 네트워크 오류');});
}
function doExport(){
  if(filteredRows.length===0){showToast('내보낼 데이터가 없습니다.');return;}
  var hdrs=['No','작업일','고객사','품명','품번','재질','계획수량','투입수량','양품수량','불량수량','출고일','출고수량'];
  var flds=['작업일','고객사','품명','품번','재질','계획수량','투입수량','양품수량','불량수량','출고일','출고수량'];
  var lines=['\uFEFF'+hdrs.join(',')];
  document.getElementById('tbody').querySelectorAll('tr[data-idx]').forEach(function(tr,i){var cells=[i+1];flds.forEach(function(f){var el=tr.querySelector('[data-field="'+f+'"]');cells.push('"'+String(el?el.value:'').replace(/"/g,'""')+'"');});lines.push(cells.join(','));});
  var blob=new Blob([lines.join('\n')],{type:'text/csv;charset=utf-8;'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='Customer_Log_'+new Date().toISOString().slice(0,10)+'.csv';a.click();URL.revokeObjectURL(url);showToast('📥 CSV 완료');
}
function tdInput(f,v,t,i){v=(v===undefined||v===null)?'':v;return '<td><input class="td-input" type="'+t+'" value="'+esc(v)+'" data-field="'+f+'" data-idx="'+i+'" oninput="markModified(this)"'+(t==='number'?' min="0"':'')+'/></td>';}
function esc(v){return String(v).replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function markModified(el){el.classList.add('modified');}
function setStatus(t,m){document.getElementById('sDot').className='status-dot '+(t==='loading'?'dot-loading':t==='error'?'dot-error':'dot-ok');document.getElementById('sText').textContent=m;}
function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},3000);}
</script>
</body>
</html>
