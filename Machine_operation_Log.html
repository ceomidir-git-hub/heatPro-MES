}

body{

    padding:20px;

.page{
    width:210mm;
    min-height:297mm;

.title{

}

.info input{

    width:130px;
    text-align:center;
    font-size:14px;
}

table{
    width:100%;
    border-collapse:collapse;
    table-layout:fixed;
}

th,td{
    border:1px solid #000;
    text-align:center;
    height:31px;
    font-size:13px;
}

th{
    background:#e8e8e8;
    font-weight:bold;
}

td input{
    width:100%;
    height:100%;
    border:none;
    text-align:center;
    font-size:13px;
    outline:none;
}

.footer{
    margin-top:8px;
    display:flex;
    justify-content:space-between;
    font-size:11px;
}

@media print{

body{
    background:white;
    padding:0;
}

.page{
    width:100%;
    min-height:auto;
    padding:0;
    box-shadow:none;
}

@page{
    size:A4;
    margin:12mm;
}

}
</style>
